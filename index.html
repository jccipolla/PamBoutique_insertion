<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pam Boutique - Stock & Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        .pam-boutique-title { font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        @media print {
            @page { margin: 0; size: 35mm 25mm; }
            body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; }
            #main-app { display: none !important; }
            #print-container { display: block !important; width: 100%; background: white; }
            .print-label {
                width: 35mm; height: 25mm; padding: 1mm; overflow: hidden; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: space-between;
                font-family: sans-serif; background: white; box-sizing: border-box;
            }
            .print-label-title { font-size: 6pt; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1mm;}
            .print-label-info { font-size: 6pt; text-align: center; font-weight: bold; }
            .print-label-barcode { height: 8mm; width: auto; max-width: 100%; }
            .print-label-price { font-size: 7pt; font-weight: bold; margin-bottom: 1mm; }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // CONFIGURATION : Remplacez par votre URL de déploiement
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwCUNmNcoikoxMIaPnJwx_R1knx5aYn4pBpg6rXhAR4R15y_w641NGKbl7MRa93nvVD/exec';

        // --- Icônes ---
        const IconSearch = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSave = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>;
        const IconCheck = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconRefresh = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
        const IconX = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconPrinter = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconCalendar = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconDownload = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconChevronDown = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>;

        const LogoPam = ({ className = "w-16 h-16" }) => (
            <img src="https://www.pamofficiel.com/cdn/shop/files/Pam_logo_vecteur_pages-to-jpg-0001.jpg?v=1773326252&width=340" alt="Pam Boutique" className={`${className} object-cover rounded-full shadow-sm bg-white border-2 border-stone-200`} />
        );

        const CATEGORIES_DISPONIBLES = ['Vêtements', 'Vestes & Manteaux', 'Pulls & Gilets', 'Robes', 'Tops & T-shirts', 'Pantalons & Jeans', 'Accessoires'];
        const TAILLES_DISPONIBLES = ['TU', 'XS', 'S', 'M', 'L', 'XL', 'XXL', '3XL', '34', '36', '38', '40', '42', '44', '46', '48'];
        const COULEURS_DISPONIBLES = ['Beige', 'Noir', 'Blanc', 'Gris', 'Bleu', 'Rouge', 'Rose', 'Vert', 'Jaune', 'Imprimé Léo', 'Camel', 'Kaki', 'Marine', 'Doré', 'Argenté', 'Multicolore', 'Marron', 'Bordeaux'];

        const generateRandomEAN13 = () => {
            let ean = "200" + Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
            let sum = 0;
            for (let i = 0; i < 12; i++) { sum += parseInt(ean[i]) * (i % 2 === 0 ? 1 : 3); }
            return ean + ((10 - (sum % 10)) % 10);
        };

        const safeString = (val) => val != null ? String(val).toLowerCase().trim().replace(/[\s-]/g, '') : '';

        // =============================================
        // COMPOSANT : RAPPORT HEBDOMADAIRE
        // =============================================
        function WeeklyReport({ fileData }) {
            const [dateFrom, setDateFrom] = useState(new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0]);
            const [dateTo, setDateTo] = useState(new Date().toISOString().split('T')[0]);
            const [expanded, setExpanded] = useState(new Set());

            const allProducts = useMemo(() => {
                if (!fileData) return [];
                const groups = {};
                fileData.forEach(row => {
                    const h = row.Handle || 'unknown';
                    if (!groups[h]) groups[h] = [];
                    groups[h].push(row);
                });
                return Object.values(groups).map(variants => ({ ...variants[0], variants }));
            }, [fileData]);

            const filtered = useMemo(() => {
                const from = new Date(dateFrom + 'T00:00:00');
                const to = new Date(dateTo + 'T23:59:59');
                return allProducts.filter(p => {
                    if (!p['Date Ajout']) return false;
                    const d = new Date(p['Date Ajout']);
                    return !isNaN(d) && d >= from && d <= to;
                });
            }, [allProducts, dateFrom, dateTo]);

            const stats = useMemo(() => {
                let qty = 0;
                filtered.forEach(p => p.variants.forEach(v => qty += parseInt(v['Variant Inventory Qty']) || 0));
                return { products: filtered.length, qty };
            }, [filtered]);

            const doPrintAll = () => {
                const labels = [];
                filtered.forEach(p => {
                    p.variants.forEach(v => {
                        const q = parseInt(v['Variant Inventory Qty']) || 0;
                        for(let i=0; i<q; i++) {
                            labels.push({ title: p.Title, size: v['Option1 Value'], color: v['Option2 Value'], ean: v['Variant Barcode'], price: v['Variant Price'] });
                        }
                    });
                });
                const pc = document.getElementById('print-container');
                pc.innerHTML = labels.map(lbl => `
                    <div class="print-label">
                        <div class="print-label-title">${lbl.title}</div>
                        <div class="print-label-info">${lbl.size} | ${lbl.color}</div>
                        ${lbl.ean ? `<img class="print-label-barcode" src="https://bwipjs-api.metafloor.com/?bcid=ean13&text=${lbl.ean}&scale=2&height=8" />` : '<div>SANS EAN</div>'}
                        <div class="print-label-price">${lbl.price} €</div>
                    </div>
                `).join('');
                window.print();
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <div className="text-[10px] text-stone-400 font-bold uppercase">Produits Arrivés</div>
                            <div className="text-2xl font-bold">{stats.products}</div>
                        </div>
                        <div className="bg-white p-4 rounded-xl border shadow-sm">
                            <div className="text-[10px] text-stone-400 font-bold uppercase">Total Pièces</div>
                            <div className="text-2xl font-bold text-blue-600">{stats.qty}</div>
                        </div>
                    </div>
                    
                    <div className="bg-white rounded-2xl border overflow-hidden shadow-sm">
                        <div className="p-4 bg-stone-50 border-b flex flex-wrap gap-2 items-center justify-between">
                            <div className="flex gap-2">
                                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="text-xs p-2 border rounded" />
                                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="text-xs p-2 border rounded" />
                            </div>
                            <button onClick={doPrintAll} className="bg-purple-600 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2"><IconPrinter /> Étiquettes du lot</button>
                        </div>
                        <div className="divide-y max-h-[400px] overflow-y-auto custom-scrollbar">
                            {filtered.map(p => (
                                <div key={p.Handle} className="p-4 hover:bg-stone-50">
                                    <div className="flex justify-between items-center cursor-pointer" onClick={() => {
                                        const n = new Set(expanded);
                                        n.has(p.Handle) ? n.delete(p.Handle) : n.add(p.Handle);
                                        setExpanded(n);
                                    }}>
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded bg-stone-100 border overflow-hidden">
                                                {(p['Photo Interne'] || p['Image Src']) && <img src={p['Photo Interne'] || p['Image Src']} className="w-full h-full object-cover" />}
                                            </div>
                                            <div>
                                                <div className="text-sm font-bold uppercase">{p.Title}</div>
                                                <div className="text-[10px] text-stone-400">{new Date(p['Date Ajout']).toLocaleDateString()}</div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-xs font-bold">{p['Variant Price']} €</div>
                                            <div className="text-[10px] text-blue-600 font-bold">{p.variants.reduce((a,v)=>a+(parseInt(v['Variant Inventory Qty'])||0),0)} pcs</div>
                                        </div>
                                    </div>
                                    {expanded.has(p.Handle) && (
                                        <div className="mt-3 space-y-1 animate-fade-in border-t pt-2">
                                            {p.variants.map((v, i) => (
                                                <div key={i} className="flex justify-between text-[10px] text-stone-500">
                                                    <span>{v['Option2 Value']} — <b>{v['Option1 Value']}</b></span>
                                                    <span>{v['Variant Barcode']}</span>
                                                    <span className="font-bold">{v['Variant Inventory Qty']} pcs</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // =============================================
        // COMPOSANT PRINCIPAL : App
        // =============================================
        function App() {
            const [userName, setUserName] = useState(localStorage.getItem('pam_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pam_username'));
            const [fileData, setFileData] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('stock');
            const [searchQuery, setSearchQuery] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [selectedGroup, setSelectedGroup] = useState(null);

            const [formData, setFormData] = useState({
                Handle: '', Title: '', Body: '', 'Variant SKU': '', 'Variant Price': '', colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: ''
            });

            useEffect(() => { if (isLoggedIn) fetchSheetData(); }, [isLoggedIn]);

            const fetchSheetData = async () => {
                setIsLoading(true);
                try {
                    const r = await fetch(WEBHOOK_URL + '?t=' + Date.now());
                    const d = await r.json();
                    if (Array.isArray(d)) setFileData(d);
                } catch (e) { console.error(e); }
                setIsLoading(false);
            };

            const handleSearch = () => {
                const q = safeString(searchQuery);
                const matches = fileData.filter(i => safeString(i.Handle).includes(q) || safeString(i.Title).includes(q) || safeString(i['Variant Barcode']).includes(q));
                const groups = {};
                matches.forEach(m => { if(!groups[m.Handle]) groups[m.Handle] = []; groups[m.Handle].push(m); });
                const res = Object.values(groups);
                if (res.length > 0) { setSelectedGroup(res[0]); setShowModal(true); }
                else alert("Produit introuvable.");
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const payloads = [];
                const now = new Date().toISOString();
                formData.colors.forEach(c => {
                    formData.sizes.forEach(s => {
                        const k = `${s}-${c}`;
                        payloads.push({
                            ...formData,
                            'Option1 Name': 'Taille', 'Option1 Value': s,
                            'Option2 Name': 'Couleur', 'Option2 Value': c,
                            'Variant Inventory Qty': formData.quantities[k] || '0',
                            'Variant Barcode': formData.eans[k] || '',
                            'Date Ajout': now,
                            'Opérateur': userName,
                            'Status': 'active'
                        });
                    });
                });
                try {
                    await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloads) });
                    alert("Stock enregistré !");
                    fetchSheetData();
                } catch(e) { alert("Erreur."); }
                setIsSaving(false);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border">
                            <LogoPam className="mx-auto mb-6" />
                            <h2 className="text-xl font-bold mb-6 uppercase">Identification</h2>
                            <input type="text" value={userName} onChange={e=>setUserName(e.target.value)} placeholder="Prénom" className="w-full p-4 border rounded-xl mb-4 text-center font-bold" />
                            <button onClick={()=>{if(userName){setIsLoggedIn(true); localStorage.setItem('pam_username', userName);}}} className="w-full py-4 bg-stone-900 text-white rounded-xl font-bold uppercase hover:bg-yellow-400 hover:text-black transition-all">Démarrer</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 space-y-6">
                    <header className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border">
                        <div className="flex items-center gap-3">
                            <LogoPam className="w-12 h-12" />
                            <div>
                                <h1 className="font-bold text-lg uppercase pam-boutique-title">Pam Stock</h1>
                                <div className="text-[10px] font-bold text-stone-400 uppercase">Par : {userName}</div>
                            </div>
                        </div>
                        <div className="flex bg-stone-100 p-1 rounded-xl gap-1">
                            {['stock', 'rapport'].map(t => (
                                <button key={t} onClick={()=>setActiveTab(t)} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase transition-all ${activeTab===t ? 'bg-white shadow-sm' : 'text-stone-400'}`}>{t}</button>
                            ))}
                        </div>
                    </header>

                    {activeTab === 'rapport' ? <WeeklyReport fileData={fileData} /> : (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-white p-4 rounded-2xl border shadow-sm flex gap-2">
                                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Scanner ou Rechercher..." className="flex-1 p-3 border rounded-xl font-bold text-stone-800" />
                                <button onClick={handleSearch} className="bg-stone-900 text-white px-6 rounded-xl font-bold text-sm uppercase">OK</button>
                            </div>

                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="sm:col-span-2">
                                        <label className="text-xs font-bold text-stone-400 uppercase">Titre du produit</label>
                                        <input type="text" value={formData.Title} onChange={e=>setFormData({...formData, Title: e.target.value.toUpperCase()})} className="w-full p-3 border rounded-xl font-bold text-lg" required />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-stone-400 uppercase">Handle (Lien)</label>
                                        <input type="text" value={formData.Handle} onChange={e=>setFormData({...formData, Handle: e.target.value.toLowerCase().replace(/\s+/g,'-')})} className="w-full p-2 border rounded-lg text-sm" required />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-stone-400 uppercase">Prix de vente (€)</label>
                                        <input type="number" step="0.01" value={formData['Variant Price']} onChange={e=>setFormData({...formData, 'Variant Price': e.target.value})} className="w-full p-2 border rounded-lg text-sm font-bold text-green-700 bg-green-50" required />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-stone-400 uppercase">Tailles & Couleurs</label>
                                    <div className="flex flex-wrap gap-2">
                                        {TAILLES_DISPONIBLES.map(s => (
                                            <button type="button" key={s} onClick={() => setFormData(p => ({...p, sizes: p.sizes.includes(s) ? p.sizes.filter(x=>x!==s) : [...p.sizes, s]}))} className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${formData.sizes.includes(s) ? 'bg-stone-900 text-white' : 'bg-white'}`}>{s}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-2 pt-2">
                                        {COULEURS_DISPONIBLES.map(c => (
                                            <button type="button" key={c} onClick={() => setFormData(p => ({...p, colors: p.colors.includes(c) ? p.colors.filter(x=>x!==c) : [...p.colors, c]}))} className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${formData.colors.includes(c) ? 'bg-yellow-400 border-yellow-500' : 'bg-white'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>

                                {formData.sizes.length > 0 && formData.colors.length > 0 && (
                                    <div className="bg-stone-50 p-4 rounded-xl space-y-4">
                                        <div className="flex justify-between items-center border-b pb-2">
                                            <span className="text-xs font-bold uppercase text-stone-500">Stock & EAN</span>
                                            <button type="button" onClick={() => {
                                                const eans = {...formData.eans};
                                                formData.colors.forEach(c => formData.sizes.forEach(s => { if(!eans[`${s}-${c}`]) eans[`${s}-${c}`] = generateRandomEAN13(); }));
                                                setFormData({...formData, eans});
                                            }} className="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded">Auto-EAN</button>
                                        </div>
                                        <div className="grid grid-cols-1 gap-3">
                                            {formData.colors.map(c => (
                                                <div key={c} className="bg-white p-3 rounded-lg border shadow-sm">
                                                    <div className="text-[10px] font-bold mb-2 uppercase text-stone-400">{c}</div>
                                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                                        {formData.sizes.map(s => (
                                                            <div key={s}>
                                                                <input type="number" placeholder={s} value={formData.quantities[`${s}-${c}`] || ''} onChange={e=>setFormData(p=>({...p, quantities: {...p.quantities, [`${s}-${c}`]: e.target.value}}))} className="w-full p-1 border rounded text-center text-xs font-bold text-blue-700" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <button type="submit" disabled={isSaving} className="w-full py-4 bg-stone-900 text-white rounded-xl font-bold uppercase shadow-lg disabled:opacity-50">
                                    {isSaving ? "Envoi..." : "Sauvegarder"}
                                </button>
                            </form>
                        </div>
                    )}

                    {showModal && selectedGroup && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden animate-fade-in p-6 text-center space-y-4">
                                <div className="w-20 h-20 bg-stone-100 mx-auto rounded-xl border flex items-center justify-center">
                                    {selectedGroup[0]['Photo Interne'] ? <img src={selectedGroup[0]['Photo Interne']} className="w-full h-full object-cover" /> : <span>📷</span>}
                                </div>
                                <h3 className="font-bold text-lg uppercase">{selectedGroup[0].Title}</h3>
                                <div className="max-h-40 overflow-y-auto space-y-2">
                                    {selectedGroup.map((v, i) => (
                                        <div key={i} className="flex justify-between text-xs border-b pb-1">
                                            <span>{v['Option2 Value']} - {v['Option1 Value']}</span>
                                            <span className="font-bold text-blue-600">{v['Variant Inventory Qty']} pcs</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-col gap-2 pt-4">
                                    <button onClick={() => {
                                        const v = selectedGroup[0];
                                        setFormData({
                                            Handle: v.Handle, Title: v.Title, Body: v['Body (HTML)'],
                                            'Variant Price': v['Variant Price'], 'Variant SKU': v['Variant SKU'],
                                            colors: [...new Set(selectedGroup.map(x=>x['Option2 Value']))],
                                            sizes: [...new Set(selectedGroup.map(x=>x['Option1 Value']))],
                                            quantities: selectedGroup.reduce((a,x)=>({...a, [`${x['Option1 Value']}-${x['Option2 Value']}`]: x['Variant Inventory Qty']}), {}),
                                            eans: selectedGroup.reduce((a,x)=>({...a, [`${x['Option1 Value']}-${x['Option2 Value']}`]: x['Variant Barcode']}), {}),
                                            internalPhoto: v['Photo Interne'] || ''
                                        });
                                        setShowModal(false);
                                    }} className="w-full py-3 bg-yellow-400 font-bold rounded-xl uppercase text-xs">Éditer Fiche</button>
                                    <button onClick={()=>setShowModal(false)} className="w-full py-3 border font-bold rounded-xl uppercase text-xs">Fermer</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div id="print-container" className="hidden"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
