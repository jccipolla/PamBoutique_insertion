<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pam Boutique - Stock & Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        .pam-boutique-title { font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Format d'impression thermique 3,5x2,5 cm STRICT */
        @media print {
            @page { margin: 0; size: 35mm 25mm; }
            body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; }
            #main-app { display: none !important; }
            #print-container { display: block !important; width: 100%; background: white; }
            .print-label {
                width: 35mm; height: 25mm; padding: 1mm; overflow: hidden; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: space-between;
                font-family: sans-serif; background: white; box-sizing: border-box;
            }
            .print-label-title { font-size: 6pt; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1mm;}
            .print-label-info { font-size: 6pt; text-align: center; font-weight: bold; }
            .print-label-barcode { height: 8mm; width: auto; max-width: 100%; }
            .print-label-price { font-size: 7pt; font-weight: bold; margin-bottom: 1mm; }
            .no-barcode { height: 8mm; border: 1px dashed #ccc; width: 90%; font-size: 5pt; display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icônes (SVG Inline pour compatibilité totale) ---
        const IconSearch = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSave = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconCheck = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconRefresh = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/></svg>;
        const IconX = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconImage = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const IconUser = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconChevronDown = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const IconCamera = ({className="w-6 h-6"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
        const IconBarcode = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg>;
        const IconPrinter = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconSparkles = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>;
        const IconCalendar = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconDownload = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

        const LogoPam = ({ className = "w-16 h-16" }) => (
            <img src="https://www.pamofficiel.com/cdn/shop/files/Pam_logo_vecteur_pages-to-jpg-0001.jpg?v=1773326252&width=340" alt="Pam Boutique" className={`${className} object-cover rounded-full shadow-sm bg-white border-2 border-stone-200`} />
        );

        const CATEGORIES_DISPONIBLES = ['Vêtements', 'Vestes & Manteaux', 'Pulls & Gilets', 'Robes', 'Tops & T-shirts', 'Pantalons & Jeans', 'Accessoires'];
        const TAILLES_DISPONIBLES = ['TU', 'XS', 'S', 'M', 'L', 'XL', 'XXL', '3XL', '34', '36', '38', '40', '42', '44', '46', '48'];
        const COULEURS_DISPONIBLES = ['Beige', 'Noir', 'Blanc', 'Gris', 'Bleu', 'Rouge', 'Rose', 'Vert', 'Jaune', 'Imprimé Léo', 'Camel', 'Kaki', 'Marine', 'Doré', 'Argenté', 'Multicolore', 'Marron', 'Bordeaux'];

        const safeString = (val) => val != null ? String(val).toLowerCase().trim().replace(/[\s-]/g, '') : '';

        // =============================================
        // COMPOSANT : RAPPORT HEBDOMADAIRE
        // =============================================
        function WeeklyReport({ fileData }) {
            const [dateFrom, setDateFrom] = useState(new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0]);
            const [dateTo, setDateTo] = useState(new Date().toISOString().split('T')[0]);
            const [expanded, setExpanded] = useState(new Set());

            const allProducts = useMemo(() => {
                if (!fileData || fileData.length === 0) return [];
                const groups = {};
                fileData.forEach(row => {
                    const handle = row.Handle || 'unknown';
                    if (!groups[handle]) groups[handle] = [];
                    groups[handle].push(row);
                });
                return Object.values(groups).map(variants => ({ ...variants[0], variants }));
            }, [fileData]);

            const filteredProducts = useMemo(() => {
                const from = new Date(dateFrom + 'T00:00:00');
                const to = new Date(dateTo + 'T23:59:59');
                return allProducts.filter(p => {
                    if (!p['Date Ajout']) return false;
                    const d = new Date(p['Date Ajout']);
                    return !isNaN(d) && d >= from && d <= to;
                });
            }, [allProducts, dateFrom, dateTo]);

            const stats = useMemo(() => {
                let qty = 0;
                filteredProducts.forEach(p => p.variants.forEach(v => qty += (parseInt(v['Variant Inventory Qty']) || 0)));
                return { count: filteredProducts.length, qty };
            }, [filteredProducts]);

            const toggleExpand = (h) => {
                const n = new Set(expanded);
                n.has(h) ? n.delete(h) : n.add(h);
                setExpanded(n);
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white p-4 rounded-2xl border shadow-sm">
                            <div className="text-[10px] text-stone-400 font-bold uppercase">Produits Arrivés</div>
                            <div className="text-2xl font-bold text-stone-900">{stats.count}</div>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border shadow-sm">
                            <div className="text-[10px] text-stone-400 font-bold uppercase">Total Pièces</div>
                            <div className="text-2xl font-bold text-blue-600">{stats.qty}</div>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden">
                        <div className="p-4 bg-stone-50 border-b flex gap-2 items-center">
                            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="text-xs p-2 border rounded-lg" />
                            <span className="text-stone-400 text-xs">→</span>
                            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="text-xs p-2 border rounded-lg" />
                        </div>
                        <div className="divide-y divide-stone-100 max-h-[500px] overflow-y-auto custom-scrollbar">
                            {filteredProducts.length === 0 ? (
                                <div className="p-10 text-center text-stone-400 text-sm italic">Aucun arrivage sur cette période.</div>
                            ) : filteredProducts.map(p => (
                                <div key={p.Handle}>
                                    <div className="flex items-center gap-3 p-4 cursor-pointer hover:bg-stone-50" onClick={() => toggleExpand(p.Handle)}>
                                        <div className="w-10 h-10 rounded bg-stone-100 overflow-hidden border shrink-0">
                                            {(p['Photo Interne'] || p['Image Src']) && <img src={p['Photo Interne'] || p['Image Src']} className="w-full h-full object-cover" />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm uppercase truncate">{p.Title}</div>
                                            <div className="text-[10px] text-stone-400">{new Date(p['Date Ajout']).toLocaleDateString()}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-xs font-bold text-green-700">{p['Variant Price']} €</div>
                                            <div className="text-[10px] text-blue-600 font-bold">{p.variants.reduce((a,v)=>a+(parseInt(v['Variant Inventory Qty'])||0),0)} pcs</div>
                                        </div>
                                    </div>
                                    {expanded.has(p.Handle) && (
                                        <div className="bg-stone-50 px-4 pb-4 space-y-1">
                                            {p.variants.map((v, i) => (
                                                <div key={i} className="flex justify-between text-[10px] border-b border-stone-200 py-1">
                                                    <span>{v['Option2 Value']} — <b>{v['Option1 Value']}</b></span>
                                                    <span className="font-mono text-stone-500">{v['Variant Barcode'] || 'PAS EAN'}</span>
                                                    <span className="font-bold">{v['Variant Inventory Qty']} pcs</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // =============================================
        // COMPOSANT PRINCIPAL : App
        // =============================================
        function App() {
            // URL DE VOTRE SCRIPT DÉPLOYÉ
            const webhookUrl = 'https://script.google.com/macros/s/AKfycbwEL3w5gIWTMaV-hxo4MT4vGqFe9K0JludBrBpo95sqPsSxHcX_b9_UQVSuE3UGN7JV6w/exec';

            const [userName, setUserName] = useState(localStorage.getItem('pam_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pam_username'));
            const [fileData, setFileData] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [activeTab, setActiveTab] = useState('stock');
            const [searchQuery, setSearchQuery] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [selectedGroup, setSelectedGroup] = useState(null);

            const [formData, setFormData] = useState({
                Handle: '', Title: '', Body: '', Type: '', Tags: '', 'Variant SKU': '', 'Variant Price': '', CostPerItem: '', colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: ''
            });

            useEffect(() => { if (isLoggedIn) fetchSheetData(); }, [isLoggedIn]);

            const fetchSheetData = async () => {
                setIsLoading(true);
                try {
                    const r = await fetch(webhookUrl + '?t=' + Date.now());
                    const d = await r.json();
                    if (Array.isArray(d)) setFileData(d);
                } catch (e) { console.error("Erreur de synchronisation", e); }
                setIsLoading(false);
            };

            const handleGlobalSearch = (e) => {
                if (e) e.preventDefault();
                const q = safeString(searchQuery);
                if (!q) return;
                const matches = fileData.filter(i => safeString(i.Handle).includes(q) || safeString(i.Title).includes(q) || safeString(i['Variant Barcode']).includes(q));
                const groups = {};
                matches.forEach(m => { if(!groups[m.Handle]) groups[m.Handle] = []; groups[m.Handle].push(m); });
                const res = Object.values(groups);
                if (res.length > 0) { setSelectedGroup(res[0]); setShowModal(true); }
                else { alert("Produit introuvable."); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.Handle || !formData.Title || !formData['Variant Price']) {
                    alert("Handle, Titre et Prix obligatoires !"); return;
                }
                setIsSaving(true);
                const payloads = [];
                const now = new Date().toISOString();
                
                formData.colors.forEach(c => {
                    formData.sizes.forEach(s => {
                        const k = `${s}-${c}`;
                        payloads.push({
                            Handle: formData.Handle,
                            Title: formData.Title,
                            'Body (HTML)': formData.Body,
                            Type: formData.Type,
                            Tags: formData.Tags,
                            'Option1 Name': 'Taille', 'Option1 Value': s,
                            'Option2 Name': 'Couleur', 'Option2 Value': c,
                            'Variant Price': formData['Variant Price'],
                            'Cost per item': formData.CostPerItem,
                            'Variant SKU': formData['Variant SKU'],
                            'Variant Inventory Qty': formData.quantities[k] || '0',
                            'Variant Barcode': formData.eans[k] || '',
                            'Date Ajout': now,
                            'Opérateur': userName,
                            'Photo Interne': formData.internalPhoto,
                            'Status': 'active'
                        });
                    });
                });

                try {
                    await fetch(webhookUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloads) });
                    alert("Fiche enregistrée avec succès !");
                    fetchSheetData();
                } catch (e) { alert("Erreur lors de la sauvegarde."); }
                setIsSaving(false);
            };

            const handlePhotoCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX = 400;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        setFormData(prev => ({ ...prev, internalPhoto: canvas.toDataURL('image/jpeg', 0.5) }));
                    };
                };
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border">
                            <LogoPam className="mx-auto mb-6" />
                            <h2 className="text-xl font-bold mb-6 uppercase tracking-wider">Pam Boutique</h2>
                            <input type="text" value={userName} onChange={e=>setUserName(e.target.value)} placeholder="Votre prénom" className="w-full p-4 border rounded-xl mb-4 text-center font-bold" />
                            <button onClick={()=>{if(userName){setIsLoggedIn(true); localStorage.setItem('pam_username', userName);}}} className="w-full py-4 bg-stone-900 text-white rounded-xl font-bold uppercase hover:bg-yellow-400 hover:text-black transition-all">Entrer</button>
                        </div>
                    </div>
                );
            }

            return (
                <div id="main-app" className="max-w-4xl mx-auto p-4 space-y-6">
                    <header className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border sticky top-4 z-30">
                        <div className="flex items-center gap-3">
                            <LogoPam className="w-10 h-10" />
                            <div>
                                <h1 className="font-bold text-base uppercase pam-boutique-title leading-tight">Pam Stock</h1>
                                <div className="text-[9px] font-bold text-stone-400 uppercase">{userName} — {fileData.length} lignes</div>
                            </div>
                        </div>
                        <div className="flex bg-stone-100 p-1 rounded-xl gap-1">
                            {['stock', 'rapport'].map(t => (
                                <button key={t} onClick={()=>setActiveTab(t)} className={`px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${activeTab===t ? 'bg-white shadow-sm text-stone-900' : 'text-stone-400'}`}>{t}</button>
                            ))}
                        </div>
                    </header>

                    {activeTab === 'rapport' ? <WeeklyReport fileData={fileData} /> : (
                        <div className="space-y-6 animate-fade-in">
                            <form onSubmit={handleGlobalSearch} className="bg-white p-4 rounded-2xl border shadow-sm flex gap-2">
                                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Scanner ou Rechercher..." className="flex-1 p-3 border rounded-xl font-bold focus:ring-2 focus:ring-yellow-400 outline-none" />
                                <button type="submit" className="bg-stone-900 text-white px-6 rounded-xl font-bold text-sm uppercase">OK</button>
                            </form>

                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="sm:col-span-2">
                                        <label className="text-[10px] font-bold text-stone-400 uppercase">Titre du produit *</label>
                                        <input type="text" value={formData.Title} onChange={e=>setFormData({...formData, Title: e.target.value.toUpperCase()})} className="w-full p-3 border rounded-xl font-bold text-lg" required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-stone-400 uppercase">Lien (Handle) *</label>
                                        <input type="text" value={formData.Handle} onChange={e=>setFormData({...formData, Handle: e.target.value.toLowerCase().replace(/\s+/g,'-')})} className="w-full p-2 border rounded-lg text-sm" required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-stone-400 uppercase">Prix de vente (€) *</label>
                                        <input type="number" step="0.01" value={formData['Variant Price']} onChange={e=>setFormData({...formData, 'Variant Price': e.target.value})} className="w-full p-2 border rounded-lg text-sm font-bold text-green-700 bg-green-50" required />
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <label className="text-[10px] font-bold text-stone-400 uppercase">Tailles & Couleurs</label>
                                    <div className="flex flex-wrap gap-2">
                                        {TAILLES_DISPONIBLES.map(s => (
                                            <button type="button" key={s} onClick={() => setFormData(p => ({...p, sizes: p.sizes.includes(s) ? p.sizes.filter(x=>x!==s) : [...p.sizes, s]}))} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${formData.sizes.includes(s) ? 'bg-stone-900 text-white' : 'bg-white'}`}>{s}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-2 pt-2">
                                        {COULEURS_DISPONIBLES.map(c => (
                                            <button type="button" key={c} onClick={() => setFormData(p => ({...p, colors: p.colors.includes(c) ? p.colors.filter(x=>x!==c) : [...p.colors, c]}))} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${formData.colors.includes(c) ? 'bg-yellow-400 border-yellow-500' : 'bg-white'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>

                                {formData.sizes.length > 0 && formData.colors.length > 0 && (
                                    <div className="bg-stone-50 p-4 rounded-xl space-y-4">
                                        <div className="flex justify-between items-center border-b pb-2">
                                            <span className="text-[10px] font-bold uppercase text-stone-500">Grille des stocks</span>
                                            <button type="button" onClick={() => {
                                                const neans = {...formData.eans};
                                                formData.colors.forEach(c => formData.sizes.forEach(s => { if(!neans[`${s}-${c}`]) neans[`${s}-${c}`] = generateRandomEAN13(); }));
                                                setFormData({...formData, eans: neans});
                                            }} className="text-[9px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded">Générer EAN</button>
                                        </div>
                                        <div className="space-y-4">
                                            {formData.colors.map(c => (
                                                <div key={c} className="bg-white p-3 rounded-lg border shadow-sm">
                                                    <div className="text-[10px] font-bold mb-2 uppercase text-stone-400">{c}</div>
                                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                                        {formData.sizes.map(s => (
                                                            <div key={s} className="space-y-1">
                                                                <div className="flex justify-between text-[9px] font-bold"><span>{s}</span></div>
                                                                <input type="number" placeholder="Qté" value={formData.quantities[`${s}-${c}`] || ''} onChange={e=>setFormData(p=>({...p, quantities: {...p.quantities, [`${s}-${c}`]: e.target.value}}))} className="w-full p-1 border rounded text-center text-xs font-bold text-blue-700" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                                    <h3 className="text-[10px] font-bold text-stone-400 uppercase mb-3">Photo Interne (Usine)</h3>
                                    <div className="flex items-center gap-4">
                                        <label className="flex-1 flex flex-col items-center justify-center p-4 border-2 border-dashed border-stone-300 rounded-xl cursor-pointer bg-white hover:bg-stone-100">
                                            <IconCamera className="mb-1 text-stone-400" />
                                            <span className="text-[10px] font-bold text-stone-500">Prendre Photo</span>
                                            <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoCapture} />
                                        </label>
                                        {formData.internalPhoto && (
                                            <div className="relative w-20 h-20 rounded-xl overflow-hidden border">
                                                <img src={formData.internalPhoto} className="w-full h-full object-cover" />
                                                <button type="button" onClick={()=>setFormData({...formData, internalPhoto:''})} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1"><IconX className="w-3 h-3"/></button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button type="submit" disabled={isSaving} className="w-full py-4 bg-stone-900 text-white rounded-xl font-bold uppercase shadow-lg hover:bg-black transition-all disabled:opacity-50">
                                    {isSaving ? "Envoi..." : "Sauvegarder le stock"}
                                </button>
                            </form>
                        </div>
                    )}

                    {showModal && selectedGroup && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden animate-fade-in p-6 text-center space-y-4">
                                <div className="w-24 h-24 bg-stone-100 mx-auto rounded-xl border flex items-center justify-center overflow-hidden">
                                    {selectedGroup[0]['Photo Interne'] ? <img src={selectedGroup[0]['Photo Interne']} className="w-full h-full object-cover" /> : <IconImage className="text-stone-300" />}
                                </div>
                                <h3 className="font-bold text-lg uppercase truncate">{selectedGroup[0].Title}</h3>
                                <div className="max-h-40 overflow-y-auto space-y-1 text-left bg-stone-50 p-3 rounded-xl custom-scrollbar">
                                    {selectedGroup.map((v, i) => (
                                        <div key={i} className="flex justify-between text-xs border-b border-stone-200 py-1">
                                            <span>{v['Option2 Value']} - {v['Option1 Value']}</span>
                                            <span className="font-bold text-blue-600">{v['Variant Inventory Qty']} pcs</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-col gap-2 pt-4">
                                    <button onClick={() => {
                                        const v = selectedGroup[0];
                                        setFormData({
                                            Handle: v.Handle, Title: v.Title, Body: v['Body (HTML)'], Type: v.Type, Tags: v.Tags, 'Variant SKU': v['Variant SKU'], 'Variant Price': v['Variant Price'], CostPerItem: v['Cost per item'],
                                            colors: [...new Set(selectedGroup.map(x=>x['Option2 Value']))],
                                            sizes: [...new Set(selectedGroup.map(x=>x['Option1 Value']))],
                                            quantities: selectedGroup.reduce((a,x)=>({...a, [`${x['Option1 Value']}-${x['Option2 Value']}`]: x['Variant Inventory Qty']}), {}),
                                            eans: selectedGroup.reduce((a,x)=>({...a, [`${x['Option1 Value']}-${x['Option2 Value']}`]: x['Variant Barcode']}), {}),
                                            internalPhoto: v['Photo Interne'] || ''
                                        });
                                        setShowModal(false);
                                    }} className="w-full py-3 bg-yellow-400 font-bold rounded-xl uppercase text-xs">Éditer la fiche</button>
                                    <button onClick={()=>setShowModal(false)} className="w-full py-3 border font-bold rounded-xl uppercase text-xs">Fermer</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div id="print-container" className="hidden"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
