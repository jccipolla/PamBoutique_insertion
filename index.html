<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pam Boutique - Stock & Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pam-boutique-title { font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        @media print {
            @page { margin: 0; size: 35mm 25mm; }
            body { margin: 0; padding: 0; background: white; }
            #main-app { display: none !important; }
            #print-container { display: block !important; width: 100%; }
            .print-label { 
                width: 35mm; height: 25mm; padding: 1mm; overflow: hidden; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
                font-family: sans-serif; box-sizing: border-box;
            }
            .print-label-title { font-size: 6pt; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .print-label-barcode { height: 8mm; width: auto; max-width: 100%; }
            .print-label-price { font-size: 7pt; font-weight: bold; }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const IconSearch = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconPrinter = () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;

        const TAILLES_DISPONIBLES = ['TU', 'XS', 'S', 'M', 'L', 'XL', 'XXL', '34', '36', '38', '40', '42', '44'];
        const COULEURS_DISPONIBLES = ['Beige', 'Noir', 'Blanc', 'Gris', 'Bleu', 'Rouge', 'Rose', 'Vert', 'Jaune', 'Camel', 'Kaki', 'Marine'];

        const safeString = (val) => val != null ? String(val).toLowerCase().trim().replace(/[\s-]/g, '') : '';
        const generateEAN = () => "200" + Math.floor(Math.random() * 1000000000).toString().padStart(9, '0') + "0";

        function App() {
            const webhookUrl = 'https://script.google.com/macros/s/AKfycbwEL3w5gIWTMaV-hxo4MT4vGqFe9K0JludBrBpo95sqPsSxHcX_b9_UQVSuE3UGN7JV6w/exec';
            const [userName] = useState(localStorage.getItem('pam_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!userName);
            const [fileData, setFileData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [selectedVariantsGroup, setSelectedVariantsGroup] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            const [formData, setFormData] = useState({ Handle: '', Title: '', 'Variant Price': '', sizes: [], colors: [], quantities: {}, eans: {}, internalPhoto: '' });

            useEffect(() => { if (isLoggedIn) fetchFileData(); }, [isLoggedIn]);

            const fetchFileData = async () => {
                try {
                    const res = await fetch(webhookUrl);
                    const data = await res.json();
                    if (Array.isArray(data)) setFileData(data);
                } catch (e) { console.error("Erreur Drive"); }
            };

            const handleGlobalSearch = (e) => {
                if (e) e.preventDefault();
                const q = safeString(searchQuery);
                if (!q) return;
                const matches = fileData.filter(item => safeString(item.Handle).includes(q) || safeString(item.Title).includes(q) || safeString(item['Variant SKU']).includes(q));
                const groups = {};
                matches.forEach(item => { if (!groups[item.Handle]) groups[item.Handle] = []; groups[item.Handle].push(item); });
                const unique = Object.values(groups);
                setSearchResults(unique);
                setSelectedVariantsGroup(unique.length === 1 ? unique[0] : null);
                setShowModal(true);
            };

            const loadForEdit = () => {
                const first = selectedVariantsGroup[0];
                const sizes = [...new Set(selectedVariantsGroup.map(v => v['Option1 Value']))];
                const colors = [...new Set(selectedVariantsGroup.map(v => v['Option2 Value']))];
                const qty = {}; const eans = {};
                selectedVariantsGroup.forEach(v => {
                    const k = `${v['Option1 Value']}-${v['Option2 Value']}`;
                    qty[k] = v['Variant Inventory Qty'];
                    eans[k] = v['Variant Barcode'];
                });
                setFormData({ ...formData, Handle: first.Handle, Title: first.Title, 'Variant Price': first['Variant Price'], sizes, colors, quantities: qty, eans, internalPhoto: first['Photo Interne'] });
                setShowModal(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const payloads = [];
                formData.sizes.forEach(s => {
                    formData.colors.forEach(c => {
                        const k = `${s}-${c}`;
                        payloads.push({
                            Handle: formData.Handle, Title: formData.Title, 'Option1 Value': s, 'Option2 Value': c,
                            'Variant Price': formData['Variant Price'], 'Variant Inventory Qty': formData.quantities[k] || '0',
                            'Variant Barcode': formData.eans[k] || '', 'Photo Interne': formData.internalPhoto,
                            'Opérateur': userName, 'Date Ajout': new Date().toISOString()
                        });
                    });
                });
                await fetch(webhookUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloads) });
                setIsSaving(false);
                alert("Sauvegardé !");
                fetchFileData();
            };

            if (!isLoggedIn) return <div className="p-10 text-center">Indiquez votre prénom...</div>;

            return (
                <div id="main-app" className="p-4 max-w-xl mx-auto space-y-6">
                    <header className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm">
                        <LogoPam className="w-12 h-12" />
                        <span className="font-bold text-green-600">● Connecté ({fileData.length})</span>
                    </header>

                    <section className="bg-white p-4 rounded-xl shadow-sm space-y-4">
                        <div className="flex gap-2">
                            <input className="flex-1 border-2 p-3 rounded-lg font-bold" placeholder="Rechercher SKU ou Nom..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                            <button onClick={handleGlobalSearch} className="bg-stone-800 text-white p-3 rounded-lg"><IconSearch /></button>
                        </div>
                        <button onClick={() => { setFormData({Handle:'', Title:'', sizes:[], colors:[], quantities:{}, eans:{}}); }} className="w-full bg-yellow-400 p-3 rounded-lg font-bold flex justify-center gap-2"><IconPlus /> Nouveau Produit</button>
                    </section>

                    <form onSubmit={handleSubmit} className="bg-white p-4 rounded-xl shadow-sm space-y-4">
                        <input className="w-full border p-2 rounded uppercase font-bold" placeholder="TITRE PRODUIT" value={formData.Title} onChange={e => setFormData({...formData, Title: e.target.value.toUpperCase()})} />
                        <input className="w-full border p-2 rounded" placeholder="handle-produit" value={formData.Handle} onChange={e => setFormData({...formData, Handle: e.target.value.toLowerCase().replace(/ /g, '-')})} />
                        
                        <div className="grid grid-cols-2 gap-2">
                            <div className="border p-2 rounded">
                                <p className="text-xs font-bold mb-1">Tailles</p>
                                <div className="flex flex-wrap gap-1">
                                    {TAILLES_DISPONIBLES.map(t => (
                                        <button type="button" key={t} onClick={() => handleCheckboxChange('sizes', t)} className={`text-xs p-1 border rounded ${formData.sizes.includes(t) ? 'bg-black text-white' : ''}`}>{t}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="border p-2 rounded">
                                <p className="text-xs font-bold mb-1">Couleurs</p>
                                <div className="flex flex-wrap gap-1">
                                    {COULEURS_DISPONIBLES.map(c => (
                                        <button type="button" key={c} onClick={() => handleCheckboxChange('colors', c)} className={`text-xs p-1 border rounded ${formData.colors.includes(c) ? 'bg-black text-white' : ''}`}>{c}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {formData.sizes.length > 0 && formData.colors.length > 0 && (
                            <div className="space-y-2 border-t pt-2">
                                {formData.colors.map(c => (
                                    <div key={c} className="text-xs">
                                        <p className="font-bold">{c}</p>
                                        <div className="grid grid-cols-3 gap-1">
                                            {formData.sizes.map(s => {
                                                const k = `${s}-${c}`;
                                                return (
                                                    <div key={s} className="bg-stone-50 p-1 rounded">
                                                        <p>{s}</p>
                                                        <input className="w-full border text-center" type="number" placeholder="Qté" value={formData.quantities[k] || ''} onChange={e => setFormData({...formData, quantities: {...formData.quantities, [k]: e.target.value}})} />
                                                        <button type="button" onClick={() => setFormData({...formData, eans: {...formData.eans, [k]: generateEAN()}})} className="text-[8px] text-blue-500 underline">EAN</button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <button className="w-full bg-stone-900 text-white p-4 rounded-xl font-bold uppercase" disabled={isSaving}>Enregistrer la fiche</button>
                    </form>

                    {showModal && selectedVariantsGroup && (
                        <div className="fixed inset-0 bg-black/50 p-4 flex items-center justify-center z-50">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm text-center space-y-4">
                                <h3 className="font-bold uppercase">{selectedVariantsGroup[0].Title}</h3>
                                <div className="w-32 h-32 mx-auto bg-stone-100 rounded-lg overflow-hidden border">
                                    <img src={selectedVariantsGroup[0]['Photo Interne']} className="w-full h-full object-cover" />
                                </div>
                                <button onClick={() => window.print()} className="w-full bg-black text-white p-3 rounded-lg flex justify-center gap-2"><IconPrinter /> Imprimer étiquettes</button>
                                <button onClick={loadForEdit} className="w-full border p-3 rounded-lg font-bold">Modifier / Stock</button>
                                <button onClick={() => setShowModal(false)} className="text-stone-400">Fermer</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
