<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pam Boutique - Import Asynchrone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        .pam-boutique-title { font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Styles spécifiques pour l'impression des étiquettes */
        @media print {
            @page { margin: 0; }
            body { margin: 0; background: white; -webkit-print-color-adjust: exact; }
            #main-app { display: none !important; }
            #print-container { display: flex !important; flex-wrap: wrap; width: 100%; gap: 2mm; padding: 2mm; background: white; align-items: flex-start; align-content: flex-start; }
            .print-label { 
                width: 35mm; 
                height: 25mm; 
                border: 1px dashed #ccc;
                padding: 1mm; 
                overflow: hidden; 
                page-break-inside: avoid; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                justify-content: space-between; 
                font-family: sans-serif; 
                background: white;
                box-sizing: border-box;
            }
            .print-label-title { font-size: 7pt; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .print-label-info { font-size: 6.5pt; text-align: center; }
            .print-label-barcode { height: 9mm; width: auto; max-width: 100%; }
            .print-label-price { font-size: 8pt; font-weight: bold; }
        }
    </style>
</head>
<body class="bg-stone-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Icônes ---
        const IconSearch = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSave = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconAlert = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconRefresh = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/></svg>;
        const IconX = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconImage = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const IconSettings = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconUser = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconChevronDown = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const IconCamera = ({className="w-6 h-6"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
        const IconBarcode = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg>;
        const IconPrinter = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconSparkles = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>;

        const LogoPam = ({ className = "w-16 h-16" }) => (
            <img src="https://www.pamofficiel.com/cdn/shop/files/Pam_logo_vecteur_pages-to-jpg-0001.jpg?v=1773326252&width=340" alt="Pam Boutique" className={`${className} object-cover rounded-full shadow-sm bg-white border-2 border-stone-200`} onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=Pam+Boutique&background=1c1917&color=facc15&rounded=true"; }} />
        );

        const CATEGORIES_DISPONIBLES = ['Vêtements', 'Vestes & Manteaux', 'Pulls & Gilets', 'Robes', 'Tops & T-shirts', 'Pantalons & Jeans', 'Accessoires'];
        const TAILLES_DISPONIBLES = ['TU', 'XS', 'S', 'M', 'L', 'XL', 'XXL', '3XL', '34', '36', '38', '40', '42', '44', '46', '48'];
        const COULEURS_DISPONIBLES = ['Beige', 'Noir', 'Blanc', 'Gris', 'Bleu', 'Rouge', 'Rose', 'Vert', 'Jaune', 'Imprimé Léo', 'Camel', 'Kaki', 'Marine', 'Doré', 'Argenté', 'Multicolore', 'Marron', 'Bordeaux'];

        const generateRandomEAN13 = () => {
            let ean = "200" + Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
            let sum = 0;
            for (let i = 0; i < 12; i++) { sum += parseInt(ean[i]) * (i % 2 === 0 ? 1 : 3); }
            return ean + ((10 - (sum % 10)) % 10);
        };

        // Fetcher robuste avec Retry pour l'IA Gemini
        const fetchWithRetry = async (url, options, retries = 3) => {
            const delays = [1000, 2000, 4000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            const [webhookUrl] = useState('https://script.google.com/macros/s/AKfycbwCUNmNcoikoxMIaPnJwx_R1knx5aYn4pBpg6rXhAR4R15y_w641NGKbl7MRa93nvVD/exec');
            const [isConfigured] = useState(true);
            
            const [userName, setUserName] = useState(localStorage.getItem('pam_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pam_username'));
            const [showColorDropdown, setShowColorDropdown] = useState(false);
            const [fileData, setFileData] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isGeneratingAI, setIsGeneratingAI] = useState(false);
            const [logs, setLogs] = useState([]);
            
            const [formData, setFormData] = useState({
                Handle: '', Title: '', Body: '', Type: '', Tags: '', 'Variant SKU': '', 'Variant Price': '', 'Variant Compare At Price': '', CostPerItem: '', Grams: '', ImageSrc: '', category: [], colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: ''
            });

            const [formStatus, setFormStatus] = useState({ type: '', message: '' });
            const [mode, setMode] = useState('new'); 
            const [showModal, setShowModal] = useState(false);
            const [searchResults, setSearchResults] = useState([]);
            const [selectedVariantsGroup, setSelectedVariantsGroup] = useState([]);

            const [customSizeInput, setCustomSizeInput] = useState('');
            const [dynamicSizes, setDynamicSizes] = useState([]);
            const [customCatInput, setCustomCatInput] = useState('');
            const [dynamicCats, setDynamicCats] = useState([]);

            const handleExists = useMemo(() => {
                if (!formData.Handle) return false;
                const query = String(formData.Handle).toLowerCase().replace(/[\s-]/g, '');
                return fileData.some(item => String(item.Handle || '').toLowerCase().replace(/[\s-]/g, '') === query);
            }, [formData.Handle, fileData]);

            const existingTags = useMemo(() => {
                const tagsSet = new Set();
                fileData.forEach(row => {
                    if (row.Tags) {
                        row.Tags.split(',').forEach(t => {
                            const tag = t.trim();
                            if(tag) tagsSet.add(tag);
                        });
                    }
                });
                return Array.from(tagsSet).sort();
            }, [fileData]);

            useEffect(() => {
                if (isConfigured && webhookUrl && isLoggedIn) {
                    fetchSheetData();
                }
            }, [isConfigured, isLoggedIn, webhookUrl]);

            const fetchSheetData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(webhookUrl);
                    const textData = await response.text();
                    let data;
                    try { data = JSON.parse(textData); } catch (e) { throw new Error("Erreur format"); }
                    if (Array.isArray(data)) {
                        setFileData(data);
                        addLog(`Connecté : ${data.length} variantes synchronisées.`, 'success');
                    }
                } catch (error) {
                    addLog(`Erreur de connexion avec le serveur.`, 'error');
                }
                setIsLoading(false);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                const finalValue = name === 'Title' ? value.toUpperCase() : value;
                setFormData(prev => ({ ...prev, [name]: finalValue }));
                setFormStatus({ type: '', message: '' });
            };

            const handleCheckboxChange = (type, value) => {
                setFormData(prev => {
                    const list = prev[type];
                    const newList = list.includes(value) ? list.filter(item => item !== value) : [...list, value];
                    return { ...prev, [type]: newList };
                });
            };

            const handleAddCustomSize = (e) => {
                if (e) e.preventDefault();
                const newSize = customSizeInput.trim().toUpperCase();
                if (!newSize) return;

                if (!TAILLES_DISPONIBLES.includes(newSize) && !dynamicSizes.includes(newSize)) {
                    setDynamicSizes(prev => [...prev, newSize]);
                }
                setFormData(prev => {
                    if (!prev.sizes.includes(newSize)) return { ...prev, sizes: [...prev.sizes, newSize] };
                    return prev;
                });
                setCustomSizeInput('');
            };

            const handleAddCustomCat = (e) => {
                if (e) e.preventDefault();
                const newCat = customCatInput.trim();
                if (!newCat) return;

                if (!CATEGORIES_DISPONIBLES.includes(newCat) && !dynamicCats.includes(newCat)) {
                    setDynamicCats(prev => [...prev, newCat]);
                }
                setFormData(prev => {
                    if (!prev.category.includes(newCat)) return { ...prev, category: [...prev.category, newCat] };
                    return prev;
                });
                setCustomCatInput('');
            };

            const handleAddTag = (tag) => {
                setFormData(prev => {
                    const currentTags = prev.Tags.split(',').map(t => t.trim()).filter(Boolean);
                    if (!currentTags.includes(tag)) {
                        currentTags.push(tag);
                        return { ...prev, Tags: currentTags.join(', ') };
                    }
                    return prev;
                });
            };

            // Fonction pour appeler Gemini IA
            const handleGenerateDescription = async () => {
                if (!formData.Title) {
                    setFormStatus({ type: 'error', message: 'Veuillez au moins renseigner le Titre du produit pour utiliser l\'IA.'});
                    return;
                }
                setIsGeneratingAI(true);
                addLog("Génération IA en cours...", "info");
                
                const apiKey = ""; // API Key injectée automatiquement
                const promptText = `En tant qu'expert en mode pour la boutique française "Pam Boutique", rédige une description courte, chic et vendeuse pour ce produit :
                Titre : ${formData.Title}
                Catégorie : ${formData.category.join(', ')}
                Couleurs : ${formData.colors.join(', ')}
                Tailles : ${formData.sizes.join(', ')}
                Tags : ${formData.Tags}
                
                La description doit être au format HTML, utiliser la balise <p> et quelques balises <strong> si pertinent. Ne pas inclure de titre <h1> ou <h2>. Être chaleureux et donner envie d'acheter. Style moderne et concis.`;

                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }]
                        })
                    });
                    
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        const cleanText = text.replace(/```html/g, '').replace(/```/g, '').trim();
                        setFormData(prev => ({ ...prev, Body: cleanText }));
                        addLog("Description IA générée avec succès.", "success");
                    }
                } catch (error) {
                    console.error("Erreur IA:", error);
                    addLog("Erreur lors de la génération de la description.", "error");
                    setFormStatus({ type: 'error', message: "L'IA est momentanément indisponible."});
                }
                setIsGeneratingAI(false);
            };

            const handleGenerateEANs = () => {
                setFormData(prev => {
                    const newEans = { ...prev.eans };
                    prev.sizes.forEach(s => {
                        prev.colors.forEach(c => {
                            const key = `${s}-${c}`;
                            if (!newEans[key]) newEans[key] = generateRandomEAN13();
                        });
                    });
                    return { ...prev, eans: newEans };
                });
                addLog("Codes EAN générés automatiquement.", "success");
            };

            const handlePhotoCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; const MAX_HEIGHT = 400;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setFormData(prev => ({ ...prev, internalPhoto: canvas.toDataURL('image/jpeg', 0.6) }));
                    };
                };
            };

            const handleSearch = (e) => {
                if (e) e.preventDefault();
                if (!formData.Handle) { setFormStatus({ type: 'error', message: 'Veuillez entrer un terme de recherche.' }); return; }
                
                const query = String(formData.Handle || '').toLowerCase().replace(/[\s-]/g, '');
                
                const matches = fileData.filter(item => 
                    String(item.Handle || '').toLowerCase().replace(/[\s-]/g, '').includes(query) || 
                    String(item.Title || '').toLowerCase().replace(/[\s-]/g, '').includes(query) ||
                    String(item['Variant SKU'] || '').toLowerCase().replace(/[\s-]/g, '').includes(query)
                );
                
                const groups = {};
                matches.forEach(item => { if (!groups[item.Handle]) groups[item.Handle] = []; groups[item.Handle].push(item); });
                const uniqueHandles = Object.keys(groups).map(handle => groups[handle]);

                setSearchResults(uniqueHandles);
                setSelectedVariantsGroup(uniqueHandles.length === 1 ? uniqueHandles[0] : null);
                setShowModal(true);
            };

            const confirmSearch = () => {
                if (selectedVariantsGroup && selectedVariantsGroup.length > 0) {
                    const firstVariant = selectedVariantsGroup[0];
                    const existingSizes = new Set();
                    const existingColors = new Set();
                    const qtyMap = {};
                    const eanMap = {};
                    
                    selectedVariantsGroup.forEach(v => {
                        const size = v['Option1 Value'] || 'TU';
                        const color = v['Option2 Value'] || 'Défaut';
                        if (v['Option1 Value']) existingSizes.add(size);
                        if (v['Option2 Value']) existingColors.add(color);
                        qtyMap[`${size}-${color}`] = v['Variant Inventory Qty'] || '';
                        if (v['Variant Barcode']) eanMap[`${size}-${color}`] = v['Variant Barcode'];
                    });

                    const loadedDynamicSizes = Array.from(existingSizes).filter(s => !TAILLES_DISPONIBLES.includes(s));
                    setDynamicSizes(loadedDynamicSizes);

                    const loadedCats = firstVariant['Product Category'] ? String(firstVariant['Product Category']).split('>').map(c => c.trim()) : [];
                    const loadedDynamicCats = loadedCats.filter(c => !CATEGORIES_DISPONIBLES.includes(c));
                    setDynamicCats(loadedDynamicCats);

                    setFormData({
                        Handle: firstVariant.Handle || '',
                        Title: firstVariant.Title || '',
                        Body: firstVariant['Body (HTML)'] || '',
                        Type: firstVariant['Type'] || '',
                        Tags: firstVariant['Tags'] || '',
                        'Variant SKU': firstVariant['Variant SKU'] ? String(firstVariant['Variant SKU']) : '', 
                        'Variant Price': firstVariant['Variant Price'] || '',
                        'Variant Compare At Price': firstVariant['Variant Compare At Price'] || '',
                        CostPerItem: firstVariant['Cost per item'] || '',
                        Grams: firstVariant['Variant Grams'] || '',
                        ImageSrc: firstVariant['Image Src'] || '',
                        category: loadedCats,
                        colors: Array.from(existingColors),
                        sizes: Array.from(existingSizes),
                        quantities: qtyMap,
                        eans: eanMap,
                        internalPhoto: firstVariant['Photo Interne'] || ''
                    });
                    setMode('edit');
                    setFormStatus({ type: 'success', message: 'Produit complet chargé.' });
                } else {
                    setFormData(prev => ({
                        ...prev, Handle: String(prev.Handle || '').toLowerCase().replace(/\s+/g, '-'), Title: '', Body: '', Type: '', Tags: '', 'Variant SKU': '', 'Variant Price': '', 'Variant Compare At Price': '', CostPerItem: '', Grams: '', ImageSrc: '', category: [], colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: ''
                    }));
                    setDynamicSizes([]);
                    setDynamicCats([]);
                    setMode('new');
                    setFormStatus({ type: 'info', message: 'Création en cours.' });
                }
                setShowModal(false);
            };

            const addLog = (message, type = 'info') => {
                setLogs(prev => [{ id: Date.now(), message, type, time: new Date().toLocaleTimeString() }, ...prev]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.Handle || !formData.Title || !formData['Variant Price']) {
                    setFormStatus({ type: 'error', message: 'Handle, Titre et Prix sont obligatoires.' }); return;
                }
                if (formData.sizes.length === 0 || formData.colors.length === 0) {
                    setFormStatus({ type: 'error', message: 'Sélectionnez au moins une taille et une couleur.' }); return;
                }

                setIsSaving(true);
                
                try {
                    const payloads = [];
                    const sizesToProcess = formData.sizes.length > 0 ? formData.sizes : ['TU'];
                    const colorsToProcess = formData.colors.length > 0 ? formData.colors : ['Défaut'];
                    let isFirstRow = true;

                    const stringifiedSizes = sizesToProcess.join('; ');
                    const stringifiedColors = colorsToProcess.join('; ');

                    sizesToProcess.forEach(size => {
                        colorsToProcess.forEach(color => {
                            const key = `${size}-${color}`;
                            const skuSuffix = (sizesToProcess.length > 1 || colorsToProcess.length > 1) ? `-${size}-${String(color).replace(/\s+/g, '').toUpperCase()}` : '';
                            
                            payloads.push({
                                'Handle': formData.Handle,
                                'Title': isFirstRow ? formData.Title : '', 
                                'Body (HTML)': isFirstRow ? formData.Body : '',
                                'Vendor': isFirstRow ? 'PAM Boutique' : '',
                                'Product Category': isFirstRow ? formData.category.join(' > ') : '',
                                'Type': isFirstRow ? formData.Type : '',
                                'Tags': isFirstRow ? formData.Tags : '',
                                'Published': isFirstRow ? 'TRUE' : '',
                                
                                'Option1 Name': 'Taille',
                                'Option1 Value': size,
                                'Option1 Linked To': 'product.metafields.shopify.size',
                                'Option2 Name': 'Couleur',
                                'Option2 Value': color,
                                'Option2 Linked To': 'product.metafields.shopify.color-pattern',

                                'Couleur (product.metafields.shopify.color-pattern)': isFirstRow ? stringifiedColors : '',

                                'Photo Interne': isFirstRow ? formData.internalPhoto : ''
                            });
                            isFirstRow = false;
                        });
                    });

                                    <div className="bg-stone-50 p-5 rounded-xl border border-stone-200">
                                        <h3 className="font-bold text-stone-800 text-sm uppercase tracking-wide border-b border-stone-200 pb-2 mb-3">Photo d'identification (Interne)</h3>
                                        <p className="text-xs text-stone-500 mb-4">Prenez une photo rapide du vêtement en stock pour vos archives. <br/><span className="text-stone-400 italic">(Cette photo ne sera pas utilisée par Shopify).</span></p>
                                        <div className="flex items-center gap-4">
                                            <label className="flex-1 flex flex-col items-center justify-center p-6 border-2 border-dashed border-stone-300 rounded-xl cursor-pointer hover:bg-stone-100 hover:border-stone-400 transition-colors">
                                                <IconCamera className="w-8 h-8 text-stone-400 mb-2" />
                                                <span className="text-sm font-medium text-stone-600 text-center">Prendre / Sélectionner une photo</span>
                                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoCapture} />
                                            </label>
                                            {formData.internalPhoto && (
                                                <div className="relative w-28 h-28 rounded-xl border border-stone-200 overflow-hidden shrink-0 shadow-sm bg-white">
                                                    <img src={formData.internalPhoto} alt="Aperçu Interne" className="w-full h-full object-cover" />
                                                    <button type="button" onClick={() => setFormData(prev => ({...prev, internalPhoto: ''}))} className="absolute top-1 right-1 bg-red-500 hover:bg-red-600 text-white rounded-full p-1 shadow transition-colors" title="Supprimer">
                                                        <IconX className="w-3 h-3" />
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="pt-2">
                                        <button type="submit" disabled={isSaving} className="w-full py-4 px-4 bg-stone-900 hover:bg-stone-800 text-white rounded-xl font-bold shadow-lg transition-all flex justify-center items-center gap-3 disabled:opacity-70 uppercase tracking-widest text-sm">
                                            {isSaving ? <div className="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> : (mode === 'edit' ? <IconSave /> : <IconPlus />)}
                                            {isSaving ? 'Envoi en cours...' : (handleExists && mode === 'new' ? 'ATTENTION : Mettre à jour' : 'Ajouter au catalogue')}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        {/* HISTORIQUE */}
                        <div className="bg-white shadow-sm rounded-2xl p-6 border border-stone-100 flex flex-col h-full max-h-[850px]">
                            <h3 className="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4 flex items-center justify-between">
                                Historique d'actions <span className="bg-stone-100 text-stone-600 px-2 py-1 rounded">{fileData.length} Lignes</span>
                            </h3>
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                {logs.length === 0 ? (
                                    <p className="text-sm text-stone-400 italic text-center mt-10">En attente de synchronisation.</p>
                                ) : (
                                    logs.map(log => (
                                    <div key={log.id} className="text-sm border-l-2 pl-3 py-2 border-stone-200">
                                        <span className="text-xs text-stone-400 font-mono block mb-1">{log.time}</span>
                                        <span className={log.type === 'success' ? 'text-green-700 font-medium' : log.type === 'error' ? 'text-red-600 font-medium' : 'text-stone-700'}>
                                        {log.message}
                                        </span>
                                    </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* FENÊTRE DE VÉRIFICATION */}
                    {showModal && (() => {
                        const totalStock = selectedVariantsGroup ? selectedVariantsGroup.reduce((sum, v) => sum + (parseInt(v['Variant Inventory Qty'], 10) || 0), 0) : 0;
                        const uniqueColors = selectedVariantsGroup ? [...new Set(selectedVariantsGroup.map(v => v['Option2 Value']).filter(Boolean))] : [];
                        const uniqueSizes = selectedVariantsGroup ? [...new Set(selectedVariantsGroup.map(v => v['Option1 Value']).filter(Boolean))] : [];
                        const displayPrice = selectedVariantsGroup && selectedVariantsGroup[0] ? selectedVariantsGroup[0]['Variant Price'] || '0.00' : '0.00';

                        // Générateur EAN dans la modale
                        const handleGenerateEANInModal = async () => {
                            if (!selectedVariantsGroup || selectedVariantsGroup.length === 0) return;
                            let eansGenerated = false;
                            const updatedVariants = selectedVariantsGroup.map(v => {
                                if (!v['Variant Barcode']) {
                                    eansGenerated = true;
                                    return { ...v, 'Variant Barcode': generateRandomEAN13() };
                                }
                                return v;
                            });

                            if (!eansGenerated) { alert("Tous les produits ont déjà un EAN !"); return; }
                            setSelectedVariantsGroup(updatedVariants);
                            addLog("Sauvegarde des nouveaux EAN...", "info");
                            try {
                                await fetch(webhookUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(updatedVariants) });
                                addLog(`EANs générés pour ${updatedVariants[0].Handle}`, 'success');
                                fetchSheetData();
                            } catch(e) { console.error(e); }
                        };

                        const modalLabelsToPrint = [];
                        if (selectedVariantsGroup) {
                            selectedVariantsGroup.forEach(v => {
                                const qty = parseInt(v['Variant Inventory Qty'], 10) || 0;
                                for(let i=0; i<qty; i++) {
                                    modalLabelsToPrint.push({ title: v.Title, size: v['Option1 Value'], color: v['Option2 Value'], ean: v['Variant Barcode'], price: v['Variant Price'] });
                                }
                            });
                        }

                        return (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center p-5 border-b border-stone-100 shrink-0 bg-stone-50">
                                    <h3 className="font-bold text-lg text-stone-900 pam-boutique-title">Fiche Produit (Scan)</h3>
                                    <button onClick={() => setShowModal(false)} className="text-stone-400 hover:text-stone-800"><IconX /></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar">
                                    {selectedVariantsGroup ? (
                                        <div className="text-center">
                                            <div className="w-32 h-32 bg-stone-100 rounded-xl mx-auto mb-4 flex items-center justify-center overflow-hidden border border-stone-200 shadow-sm">
                                                {selectedVariantsGroup[0]['Photo Interne'] ? <img src={selectedVariantsGroup[0]['Photo Interne']} className="w-full h-full object-cover" /> : selectedVariantsGroup[0]['Image Src'] ? <img src={selectedVariantsGroup[0]['Image Src']} className="w-full h-full object-cover" /> : <IconImage className="text-stone-400 w-8 h-8" />}
                                            </div>
                                            <h4 className="font-bold text-stone-900 text-xl mb-1 uppercase">{selectedVariantsGroup[0].Title || 'Produit sans titre'}</h4>
                                            <p className="text-sm text-stone-500 mb-6 font-mono bg-stone-100 inline-block px-3 py-1 rounded">{selectedVariantsGroup[0].Handle}</p>
                                            
                                            <div className="bg-stone-50 rounded-xl p-4 mb-6 text-left border border-stone-200">
                                                <h5 className="text-sm font-bold text-stone-800 mb-3 uppercase tracking-wide">Résumé du stock</h5>
                                                
                                                <div className="grid grid-cols-2 gap-2 mb-4">
                                                    <div className="bg-white p-3 rounded-lg border border-stone-200 text-center shadow-sm flex flex-col justify-center">
                                                        <p className="text-xs text-stone-500 uppercase font-bold mb-1">Volume Total</p>
                                                        <p className="font-bold text-xl text-blue-600">{totalStock} <span className="text-sm text-blue-400">pces</span></p>
                                                    </div>
                                                    <div className="bg-white p-3 rounded-lg border border-stone-200 text-center shadow-sm flex flex-col justify-center">
                                                        <p className="text-xs text-stone-500 uppercase font-bold mb-1">Prix Unitaire</p>
                                                        <p className="font-bold text-xl text-green-600">{displayPrice} <span className="text-sm text-green-400">€</span></p>
                                                    </div>
                                                </div>

                                                <div className="flex justify-between items-end mb-2 mt-4">
                                                    <p className="text-sm font-bold text-stone-800 uppercase tracking-wide">Détail des déclinaisons :</p>
                                                    <button onClick={handleGenerateEANInModal} className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 rounded-md text-xs font-bold transition-colors">
                                                        <IconBarcode className="w-3 h-3" /> Auto EAN
                                                    </button>
                                                </div>

                                                <div className="flex flex-col gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                                                    {selectedVariantsGroup.map((v, i) => (
                                                        <div key={i} className="flex flex-col sm:flex-row sm:justify-between sm:items-center bg-white border border-stone-200 px-3 py-2 rounded-lg shadow-sm gap-2">
                                                            <div className="flex flex-col w-full sm:w-auto">
                                                                <span className="text-stone-800 font-bold text-sm flex justify-between sm:justify-start">
                                                                    <span>{v['Option2 Value'] || 'Défaut'} - <span className="bg-stone-100 px-2 py-0.5 rounded text-stone-600">{v['Option1 Value'] || 'TU'}</span></span>
                                                                    <span className="sm:hidden text-stone-500 font-medium">{v['Variant Price'] || '0.00'} €</span>
                                                                </span>
                                                                <span className="text-xs text-stone-400 font-mono mt-0.5">SKU: {v['Variant SKU'] || 'N/A'}</span>
                                                                {v['Variant Barcode'] ? 
                                                                    <span className="text-[10px] text-green-600 font-mono flex items-center gap-1 font-bold mt-1"><IconBarcode className="w-3 h-3"/> {v['Variant Barcode']}</span> :
                                                                    <span className="text-[10px] text-red-400 font-mono flex items-center gap-1 mt-1">EAN Manquant</span>
                                                                }
                                                            </div>
                                                            <div className="flex items-center gap-3 self-end sm:self-auto">
                                                                <span className="hidden sm:inline text-stone-500 font-medium text-sm whitespace-nowrap">{v['Variant Price'] || '0.00'} €</span>
                                                                <span className="text-blue-700 font-bold bg-blue-50 px-2 py-1 rounded-md text-sm border border-blue-100 whitespace-nowrap">
                                                                    Qté: {v['Variant Inventory Qty'] || '0'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-3 mt-6">
                                                <button 
                                                    onClick={() => {
                                                        const printContainer = document.getElementById('print-container');
                                                        if(printContainer) {
                                                            const labelsHtml = modalLabelsToPrint.map(lbl => `
                                                                <div class="print-label">
                                                                    <div class="print-label-title">${lbl.title || 'PAM BOUTIQUE'}</div>
                                                                    <div class="print-label-info">${lbl.size} | ${lbl.color}</div>
                                                                    ${lbl.ean ? `<img class="print-label-barcode" src="https://bwipjs-api.metafloor.com/?bcid=ean13&text=${lbl.ean}&scale=2&height=5&textxalign=center&textsize=8" />` : '<div style="height:9mm;border:1px dashed #ccc;width:100%;font-size:6pt;display:flex;align-items:center;justify-content:center">Sans EAN</div>'}
                                                                    <div class="print-label-price">${lbl.price ? lbl.price + ' €' : ''}</div>
                                                                </div>
                                                            `).join('');
                                                            printContainer.innerHTML = labelsHtml;
                                                            window.print();
                                                        }
                                                    }} 
                                                    disabled={totalStock === 0}
                                                    className="w-full px-4 py-4 text-white bg-stone-900 hover:bg-black rounded-xl font-bold shadow-md transition-colors flex justify-center items-center gap-2 disabled:opacity-50"
                                                >
                                                    <IconPrinter className="w-5 h-5"/> Imprimer {totalStock} étiquette(s)
                                                </button>
                                                <div className="flex gap-3">
                                                    <button onClick={() => { searchResults.length > 1 ? setSelectedVariantsGroup(null) : setShowModal(false) }} className="flex-1 px-4 py-3 border border-stone-300 text-stone-700 rounded-xl hover:bg-stone-50 font-bold transition-colors">Fermer</button>
                                                    <button onClick={confirmSearch} className="flex-1 px-4 py-3 text-stone-900 bg-yellow-400 hover:bg-yellow-500 rounded-xl font-bold shadow-sm transition-colors">Modifier la fiche</button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : searchResults.length > 1 ? (
                                        <div>
                                            <p className="text-stone-600 mb-4 text-center">Plusieurs produits correspondent. Lequel voulez-vous ouvrir ?</p>
                                            <div className="space-y-3 mb-6 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                                                {searchResults.map((group, idx) => (
                                                    <div key={idx} onClick={() => setSelectedVariantsGroup(group)} className="flex items-center gap-4 p-4 border border-stone-200 rounded-xl hover:border-stone-900 hover:bg-stone-50 cursor-pointer transition-all">
                                                        <div className="w-16 h-16 bg-stone-100 rounded-lg shrink-0 flex items-center justify-center overflow-hidden border border-stone-200">
                                                            {group[0]['Photo Interne'] ? <img src={group[0]['Photo Interne']} className="w-full h-full object-cover" /> : group[0]['Image Src'] ? <img src={group[0]['Image Src']} className="w-full h-full object-cover" /> : <IconImage className="text-stone-400 w-6 h-6" />}
                                                        </div>
                                                        <div className="overflow-hidden">
                                                            <p className="font-bold text-stone-900 truncate uppercase">{group[0].Title || 'Sans titre'}</p>
                                                            <p className="text-xs text-stone-500 font-mono truncate">{group[0].Handle}</p>
                                                            <p className="text-xs text-stone-400 mt-1">{group.length} variante(s) trouvée(s)</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setShowModal(false)} className="w-full px-4 py-3 border border-stone-300 rounded-xl hover:bg-stone-50 font-bold text-stone-700 transition-colors">Annuler</button>
                                        </div>
                                    ) : (
                                        <div className="text-center py-6">
                                            <div className="w-20 h-20 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-6"><IconSearch width="32" height="32" /></div>
                                            <h4 className="font-bold text-stone-900 text-xl mb-2 pam-boutique-title">Nouveau Produit</h4>
                                            <p className="text-stone-600 mb-8">Ce produit n'existe pas encore. Voulez-vous préparer la fiche pour l'ajouter au catalogue en ligne ?</p>
                                            <div className="flex gap-3">
                                                <button onClick={() => setShowModal(false)} className="flex-1 px-4 py-3 border border-stone-300 rounded-xl hover:bg-stone-50 font-bold text-stone-700 transition-colors">Annuler</button>
                                                <button onClick={confirmSearch} className="flex-1 px-4 py-3 text-white bg-stone-900 hover:bg-stone-800 rounded-xl font-bold shadow-md transition-colors">Créer la fiche</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                </div>
                </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
