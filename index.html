<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pam Boutique - Stock & Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        .pam-boutique-title { font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Format d'impression thermique 3,5x2,5 cm STRICT */
        @media print {
            @page { margin: 0; size: 35mm 25mm; }
            body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; }
            #main-app { display: none !important; }
            #print-container { display: block !important; width: 100%; background: white; }
            .print-label { 
                width: 35mm; height: 25mm; padding: 1mm; overflow: hidden; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
                font-family: sans-serif; background: white; box-sizing: border-box;
            }
            .print-label-title { font-size: 6pt; font-weight: bold; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1mm;}
            .print-label-info { font-size: 6pt; text-align: center; font-weight: bold; }
            .print-label-barcode { height: 8mm; width: auto; max-width: 100%; }
            .print-label-price { font-size: 7pt; font-weight: bold; margin-bottom: 1mm; }
            .no-barcode { height: 8mm; border: 1px dashed #ccc; width: 90%; font-size: 5pt; display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icônes ---
        const IconSearch = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSave = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconCheck = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconAlert = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconRefresh = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 0 20.49 15"/></svg>;
        const IconX = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconImage = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const IconUser = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconChevronDown = ({className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const IconCamera = ({className="w-6 h-6"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
        const IconBarcode = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg>;
        const IconPrinter = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconSparkles = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>;

        const LogoPam = ({ className = "w-16 h-16" }) => (
            <img src="https://www.pamofficiel.com/cdn/shop/files/Pam_logo_vecteur_pages-to-jpg-0001.jpg?v=1773326252&width=340" alt="Pam Boutique" className={`${className} object-cover rounded-full shadow-sm bg-white border-2 border-stone-200`} onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=Pam+Boutique&background=1c1917&color=facc15&rounded=true"; }} />
        );

        const CATEGORIES_DISPONIBLES = ['Vêtements', 'Vestes & Manteaux', 'Pulls & Gilets', 'Robes', 'Tops & T-shirts', 'Pantalons & Jeans', 'Accessoires'];
        const TAILLES_DISPONIBLES = ['TU', 'XS', 'S', 'M', 'L', 'XL', 'XXL', '3XL', '34', '36', '38', '40', '42', '44', '46', '48'];
        const COULEURS_DISPONIBLES = ['Beige', 'Noir', 'Blanc', 'Gris', 'Bleu', 'Rouge', 'Rose', 'Vert', 'Jaune', 'Imprimé Léo', 'Camel', 'Kaki', 'Marine', 'Doré', 'Argenté', 'Multicolore', 'Marron', 'Bordeaux'];

        // EAN-13 valide
        const generateRandomEAN13 = () => {
            let ean = "200" + Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
            let sum = 0;
            for (let i = 0; i < 12; i++) { sum += parseInt(ean[i]) * (i % 2 === 0 ? 1 : 3); }
            return ean + ((10 - (sum % 10)) % 10);
        };

        // Sécurisation globale des chaînes
        const safeString = (val) => val != null ? String(val).toLowerCase().trim().replace(/[\s-]/g, '') : '';

        function App() {
            const [webhookUrl] = useState('https://script.google.com/macros/s/AKfycbwCUNmNcoikoxMIaPnJwx_R1knx5aYn4pBpg6rXhAR4R15y_w641NGKbl7MRa93nvVD/exec');
            
            const [userName, setUserName] = useState(localStorage.getItem('pam_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pam_username'));
            const [fileData, setFileData] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [logs, setLogs] = useState([]);
            
            // UX Mobile States
            const [searchQuery, setSearchQuery] = useState('');
            const [showColorDropdown, setShowColorDropdown] = useState(false);
            const [mode, setMode] = useState('new'); 
            const [showModal, setShowModal] = useState(false);
            const [searchResults, setSearchResults] = useState([]);
            const [selectedVariantsGroup, setSelectedVariantsGroup] = useState([]);

            // Formulaire
            const [formData, setFormData] = useState({
                Handle: '', Title: '', Body: '', Type: '', Tags: '', 'Variant SKU': '', 'Variant Price': '', 'Variant Compare At Price': '', CostPerItem: '', Grams: '', ImageSrc: '', category: [], colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: ''
            });
            const [formStatus, setFormStatus] = useState({ type: '', message: '' });

            // Champs personnalisés
            const [customSizeInput, setCustomSizeInput] = useState('');
            const [dynamicSizes, setDynamicSizes] = useState([]);
            const [customCatInput, setCustomCatInput] = useState('');
            const [dynamicCats, setDynamicCats] = useState([]);

            // DOUBLE CHECK : Détection doublon en temps réel
            const handleExists = useMemo(() => {
                const queryHandle = safeString(formData.Handle);
                const querySku = safeString(formData['Variant SKU']);
                if (!queryHandle && !querySku) return false;

                return fileData.some(item => {
                    const itemH = safeString(item.Handle);
                    const itemS = safeString(item['Variant SKU']);
                    return (queryHandle && itemH === queryHandle) || (querySku && itemS === querySku);
                });
            }, [formData.Handle, formData['Variant SKU'], fileData]);

            // HISTORIQUE TAGS INTELLIGENT
            const existingTags = useMemo(() => {
                const tagsSet = new Set();
                fileData.forEach(row => {
                    if (row.Tags) {
                        String(row.Tags).split(',').forEach(t => {
                            const tag = t.trim();
                            if(tag) tagsSet.add(tag);
                        });
                    }
                });
                return Array.from(tagsSet).sort();
            }, [fileData]);

            useEffect(() => {
                if (webhookUrl && isLoggedIn) fetchSheetData();
            }, [isLoggedIn, webhookUrl]);

            const fetchSheetData = async () => {
                setIsLoading(true);
                try {
                    const cacheBusterUrl = webhookUrl + '?t=' + new Date().getTime();
                    const response = await fetch(cacheBusterUrl);
                    const textData = await response.text();
                    let data = JSON.parse(textData);
                    if (Array.isArray(data)) {
                        setFileData(data);
                        addLog(`Connecté : ${data.length} variantes.`, 'success');
                    }
                } catch (error) {
                    addLog(`Erreur de connexion.`, 'error');
                }
                setIsLoading(false);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                // MAJUSCULES FORCÉES SUR LE TITRE
                const finalValue = name === 'Title' ? String(value).toUpperCase() : value;
                setFormData(prev => ({ ...prev, [name]: finalValue }));
                setFormStatus({ type: '', message: '' });
            };

            const handleCheckboxChange = (type, value) => {
                setFormData(prev => {
                    const list = prev[type];
                    const newList = list.includes(value) ? list.filter(item => item !== value) : [...list, value];
                    return { ...prev, [type]: newList };
                });
            };

            const handleAddCustomSize = (e) => {
                if (e) e.preventDefault();
                const newSize = customSizeInput.trim().toUpperCase();
                if (!newSize) return;
                if (!TAILLES_DISPONIBLES.includes(newSize) && !dynamicSizes.includes(newSize)) {
                    setDynamicSizes(prev => [...prev, newSize]);
                }
                setFormData(prev => {
                    if (!prev.sizes.includes(newSize)) return { ...prev, sizes: [...prev.sizes, newSize] };
                    return prev;
                });
                setCustomSizeInput('');
            };

            // NOUVELLE CATEGORIE + WARNING
            const handleAddCustomCat = (e) => {
                if (e) e.preventDefault();
                const newCat = customCatInput.trim();
                if (!newCat) return;
                if (!CATEGORIES_DISPONIBLES.includes(newCat) && !dynamicCats.includes(newCat)) {
                    setDynamicCats(prev => [...prev, newCat]);
                }
                setFormData(prev => {
                    if (!prev.category.includes(newCat)) {
                        alert(`⚠️ AVERTISSEMENT : La catégorie "${newCat}" n'est pas standard. Assurez-vous qu'elle existe dans Shopify.`);
                        return { ...prev, category: [...prev.category, newCat] };
                    }
                    return prev;
                });
                setCustomCatInput('');
            };

            // AJOUT TAG DEPUIS HISTORIQUE
            const handleAddTag = (tag) => {
                setFormData(prev => {
                    const currentTags = prev.Tags ? String(prev.Tags).split(',').map(t => t.trim()).filter(Boolean) : [];
                    if (!currentTags.includes(tag)) {
                        currentTags.push(tag);
                        return { ...prev, Tags: currentTags.join(', ') };
                    }
                    return prev;
                });
            };

            // GENERATION EAN (FORMULAIRE)
            const handleGenerateEANs = () => {
                setFormData(prev => {
                    const newEans = { ...prev.eans };
                    prev.sizes.forEach(s => {
                        prev.colors.forEach(c => {
                            const key = `${s}-${c}`;
                            if (!newEans[key]) newEans[key] = generateRandomEAN13();
                        });
                    });
                    return { ...prev, eans: newEans };
                });
                addLog("Codes EAN générés.", "success");
            };

            const handlePhotoCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; const MAX_HEIGHT = 300;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setFormData(prev => ({ ...prev, internalPhoto: canvas.toDataURL('image/jpeg', 0.4) }));
                    };
                };
            };

            // RECHERCHE GLOBALE
            const handleGlobalSearch = (e) => {
                if (e) e.preventDefault();
                if (!searchQuery) return;
                
                const query = safeString(searchQuery);
                const matches = (fileData || []).filter(item => 
                    safeString(item.Handle).includes(query) || 
                    safeString(item.Title).includes(query) ||
                    safeString(item['Variant SKU']).includes(query) ||
                    safeString(item['Variant Barcode']).includes(query)
                );
                
                const groups = {};
                matches.forEach(item => { if (!groups[item.Handle]) groups[item.Handle] = []; groups[item.Handle].push(item); });
                const uniqueHandles = Object.keys(groups).map(handle => groups[handle]);

                setSearchResults(uniqueHandles);
                setSelectedVariantsGroup(uniqueHandles.length === 1 ? uniqueHandles[0] : null);
                setShowModal(true);
            };

            // CREATION DIRECTE DEPUIS BARRE DE RECHERCHE
            const handleCreateDirect = () => {
                handleReset();
                if(searchQuery) {
                    setFormData(prev => ({
                        ...prev, 
                        Title: String(searchQuery).toUpperCase(), // MAJUSCULES
                        Handle: String(searchQuery).toLowerCase().replace(/[\s_]+/g, '-').replace(/[^\w-]/g, '') 
                    }));
                }
                setMode('new');
                setFormStatus({ type: 'info', message: 'Nouveau produit. Remplissez la fiche.' });
                window.scrollTo({ top: 300, behavior: 'smooth' });
            };

            const loadProductToForm = () => {
                if (!selectedVariantsGroup || selectedVariantsGroup.length === 0) return;
                const firstVariant = selectedVariantsGroup[0];
                const existingSizes = new Set();
                const existingColors = new Set();
                const qtyMap = {};
                const eanMap = {};
                
                selectedVariantsGroup.forEach(v => {
                    const size = String(v['Option1 Value'] || 'TU');
                    const color = String(v['Option2 Value'] || 'Défaut');
                    if (v['Option1 Value']) existingSizes.add(size);
                    if (v['Option2 Value']) existingColors.add(color);
                    qtyMap[`${size}-${color}`] = v['Variant Inventory Qty'] || '';
                    if (v['Variant Barcode']) eanMap[`${size}-${color}`] = v['Variant Barcode'];
                });

                const loadedDynamicSizes = Array.from(existingSizes).filter(s => !TAILLES_DISPONIBLES.includes(s));
                setDynamicSizes(loadedDynamicSizes);

                const loadedCats = firstVariant['Product Category'] ? String(firstVariant['Product Category']).split('>').map(c => c.trim()) : [];
                const loadedDynamicCats = loadedCats.filter(c => !CATEGORIES_DISPONIBLES.includes(c));
                setDynamicCats(loadedDynamicCats);

                setFormData({
                    Handle: String(firstVariant.Handle || ''),
                    Title: String(firstVariant.Title || ''),
                    Body: String(firstVariant['Body (HTML)'] || ''),
                    Type: String(firstVariant['Type'] || ''),
                    Tags: String(firstVariant['Tags'] || ''),
                    'Variant SKU': firstVariant['Variant SKU'] ? String(firstVariant['Variant SKU']).split('-')[0] : '', 
                    'Variant Price': firstVariant['Variant Price'] || '',
                    'Variant Compare At Price': firstVariant['Variant Compare At Price'] || '',
                    CostPerItem: firstVariant['Cost per item'] || '',
                    Grams: firstVariant['Variant Grams'] || '',
                    ImageSrc: firstVariant['Image Src'] || '',
                    category: loadedCats,
                    colors: Array.from(existingColors),
                    sizes: Array.from(existingSizes),
                    quantities: qtyMap,
                    eans: eanMap,
                    internalPhoto: firstVariant['Photo Interne'] || ''
                });
                setMode('edit');
                setFormStatus({ type: 'success', message: 'Produit chargé. Prêt à modifier.' });
                setShowModal(false);
                window.scrollTo({ top: 300, behavior: 'smooth' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.Handle || !formData.Title || !formData['Variant Price']) {
                    setFormStatus({ type: 'error', message: 'Handle, Titre et Prix sont obligatoires.' }); return;
                }
                if (formData.sizes.length === 0 || formData.colors.length === 0) {
                    setFormStatus({ type: 'error', message: 'Sélectionnez au moins une taille et une couleur.' }); return;
                }

                setIsSaving(true);
                
                try {
                    const payloads = [];
                    const sizesToProcess = formData.sizes.length > 0 ? formData.sizes : ['TU'];
                    const colorsToProcess = formData.colors.length > 0 ? formData.colors : ['Défaut'];
                    let isFirstRow = true;

                    const stringifiedSizes = sizesToProcess.join('; ');
                    const stringifiedColors = colorsToProcess.join('; ');

                    sizesToProcess.forEach(size => {
                        colorsToProcess.forEach(color => {
                            const key = `${size}-${color}`;
                            const skuSuffix = (sizesToProcess.length > 1 || colorsToProcess.length > 1) ? `-${size}-${String(color).replace(/\s+/g, '').toUpperCase()}` : '';
                            
                            payloads.push({
                                'Handle': formData.Handle,
                                'Title': isFirstRow ? formData.Title : '', 
                                'Body (HTML)': isFirstRow ? formData.Body : '',
                                'Vendor': isFirstRow ? 'PAM Boutique' : '',
                                'Product Category': isFirstRow ? formData.category.join(' > ') : '',
                                'Type': isFirstRow ? formData.Type : '',
                                'Tags': isFirstRow ? formData.Tags : '',
                                'Published': isFirstRow ? 'TRUE' : '',
                                
                                'Option1 Name': 'Taille',
                                'Option1 Value': size,
                                'Option1 Linked To': 'product.metafields.shopify.size',
                                'Option2 Name': 'Couleur',
                                'Option2 Value': color,
                                'Option2 Linked To': 'product.metafields.shopify.color-pattern',
                                
                                'Taille (product.metafields.shopify.size)': isFirstRow ? stringifiedSizes : '',
                                'Couleur (product.metafields.shopify.color-pattern)': isFirstRow ? stringifiedColors : '',
                                
                                'Variant SKU': formData['Variant SKU'] ? `${formData['Variant SKU']}${skuSuffix}` : '',
                                'Variant Barcode': formData.eans[key] || '', 
                                'Variant Grams': formData.Grams,
                                'Variant Inventory Tracker': 'shopify',
                                'Variant Inventory Policy': 'deny',
                                'Variant Fulfillment Service': 'manual',
                                'Variant Price': formData['Variant Price'],
                                'Variant Compare At Price': formData['Variant Compare At Price'],
                                'Variant Requires Shipping': 'TRUE',
                                'Variant Taxable': 'TRUE',
                                'Variant Weight Unit': 'kg',
                                'Image Src': isFirstRow ? formData.ImageSrc : '',
                                'Image Position': isFirstRow ? '1' : '',
                                'Cost per item': formData.CostPerItem,
                                'Status': isFirstRow ? 'active' : '',
                                'Variant Inventory Qty': formData.quantities[key] || '0',
                                
                                'Opérateur': userName,
                                'Photo Interne': isFirstRow ? formData.internalPhoto : ''
                            });
                            isFirstRow = false;
                        });
                    });

                    await fetch(webhookUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payloads)
                    });
                    
                    addLog(`Enregistré : ${formData.Handle} (${payloads.length} var.)`, 'success');
                    setFormStatus({ type: 'success', message: 'Sauvegardé avec succès !' });
                    
                    setTimeout(() => { fetchSheetData(); }, 1500);
                    
                } catch (error) {
                    addLog(`Erreur de sauvegarde`, 'error');
                    setFormStatus({ type: 'error', message: 'Impossible de joindre Google Sheets.' });
                }
                setIsSaving(false);
            };

            const handleReset = () => {
                setFormData({ Handle: '', Title: '', Body: '', Type: '', Tags: '', 'Variant SKU': '', 'Variant Price': '', 'Variant Compare At Price': '', CostPerItem: '', Grams: '', ImageSrc: '', category: [], colors: [], sizes: [], quantities: {}, eans: {}, internalPhoto: '' });
                setDynamicSizes([]); setDynamicCats([]); setCustomSizeInput(''); setCustomCatInput(''); setSearchQuery('');
                setMode('new'); setFormStatus({ type: '', message: '' });
            };

            // IMPRESSION GESTION
            const getLabelsToPrint = () => {
                const labels = [];
                if (showModal && selectedVariantsGroup) {
                    selectedVariantsGroup.forEach(v => {
                        const qty = parseInt(v['Variant Inventory Qty'], 10) || 0;
                        for(let i=0; i<qty; i++) {
                            labels.push({ title: v.Title || selectedVariantsGroup[0].Title, size: v['Option1 Value'], color: v['Option2 Value'], ean: v['Variant Barcode'], price: v['Variant Price'] });
                        }
                    });
                } else {
                    formData.sizes.forEach(s => {
                        formData.colors.forEach(c => {
                            const key = `${s}-${c}`;

                            <div className="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                {logs.length === 0 ? (
                                    <p className="text-sm text-stone-400 italic text-center mt-10">En attente d'actions.</p>
                                ) : (
                                    logs.reverse().map(log => (
                                    <div key={log.id} className="text-sm border-l-2 pl-3 py-2 border-stone-200">
                                        <span className="text-xs text-stone-400 font-mono block mb-1">{log.time}</span>
                                        <span className={log.type === 'success' ? 'text-green-700 font-medium' : log.type === 'error' ? 'text-red-600 font-medium' : 'text-stone-700'}>
                                        {log.message}
                                        </span>
                                    </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* FENÊTRE DE VÉRIFICATION SCAN SKU (Mode Modale) */}
                    {showModal && (() => {
                        const totalStock = selectedVariantsGroup ? selectedVariantsGroup.reduce((sum, v) => sum + (parseInt(v['Variant Inventory Qty'], 10) || 0), 0) : 0;
                        const uniqueColors = selectedVariantsGroup ? [...new Set(selectedVariantsGroup.map(v => v['Option2 Value']).filter(Boolean))] : [];
                        const uniqueSizes = selectedVariantsGroup ? [...new Set(selectedVariantsGroup.map(v => v['Option1 Value']).filter(Boolean))] : [];
                        const displayPrice = selectedVariantsGroup && selectedVariantsGroup[0] ? selectedVariantsGroup[0]['Variant Price'] || '0.00' : '0.00';

                        // Générateur EAN depuis la modale (sauvegarde automatique en arrière-plan)
                        const handleGenerateEANInModal = async () => {
                            if (!selectedVariantsGroup || selectedVariantsGroup.length === 0) return;
                            let eansGenerated = false;
                            const updatedVariants = selectedVariantsGroup.map(v => {
                                if (!v['Variant Barcode']) {
                                    eansGenerated = true;
                                    return { ...v, 'Variant Barcode': generateRandomEAN13() };
                                }
                                return v;
                            });

                            if (!eansGenerated) { alert("Tous les produits ont déjà un EAN ! Imprimez les étiquettes."); return; }
                            
                            setSelectedVariantsGroup(updatedVariants);
                            addLog("Sauvegarde des EAN générés...", "info");
                            try {
                                await fetch(webhookUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(updatedVariants) });
                                addLog(`EANs sauvegardés pour ${updatedVariants[0].Handle}`, 'success');
                                fetchSheetData();
                            } catch(e) {}
                        };

                        const modalLabelsToPrint = [];
                        if (selectedVariantsGroup) {
                            selectedVariantsGroup.forEach(v => {
                                const qty = parseInt(v['Variant Inventory Qty'], 10) || 0;
                                for(let i=0; i<qty; i++) {
                                    modalLabelsToPrint.push({ title: v.Title, size: v['Option1 Value'], color: v['Option2 Value'], ean: v['Variant Barcode'], price: v['Variant Price'] });
                                }
                            });
                        }

                        return (
                        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[95vh] sm:max-h-[90vh]">
                                <div className="flex justify-between items-center p-4 sm:p-5 border-b border-stone-100 shrink-0 bg-stone-50">
                                    <h3 className="font-bold text-base sm:text-lg text-stone-900 pam-boutique-title">Fiche Produit (Scan Usine)</h3>
                                    <button onClick={() => setShowModal(false)} className="text-stone-400 hover:text-stone-800 bg-stone-200 p-1.5 rounded-full"><IconX /></button>
                                </div>
                                
                                <div className="p-4 sm:p-6 overflow-y-auto custom-scrollbar">
                                    {selectedVariantsGroup ? (
                                        <div className="text-center">
                                            <div className="w-28 h-28 sm:w-40 sm:h-40 bg-stone-100 rounded-xl mx-auto mb-4 flex items-center justify-center overflow-hidden border-2 border-stone-200 shadow-sm relative">
                                                {selectedVariantsGroup[0]['Photo Interne'] ? <img src={selectedVariantsGroup[0]['Photo Interne']} className="w-full h-full object-cover" /> : selectedVariantsGroup[0]['Image Src'] ? <img src={selectedVariantsGroup[0]['Image Src']} className="w-full h-full object-cover" /> : <IconImage className="text-stone-400 w-10 h-10" />}
                                            </div>
                                            <h4 className="font-bold text-stone-900 text-lg sm:text-xl mb-1 uppercase px-2">{selectedVariantsGroup[0].Title || 'Produit sans titre'}</h4>
                                            <p className="text-xs text-stone-500 mb-4 sm:mb-6 font-mono bg-stone-100 inline-block px-3 py-1 rounded">Réf: {selectedVariantsGroup[0]['Variant SKU'] || 'N/A'}</p>
                                            
                                            <div className="bg-stone-50 rounded-xl p-3 sm:p-4 mb-6 text-left border border-stone-200">
                                                <div className="grid grid-cols-2 gap-2 mb-4">
                                                    <div className="bg-white p-2 sm:p-3 rounded-lg border border-stone-200 text-center shadow-sm">
                                                        <p className="text-[9px] sm:text-[10px] text-stone-500 uppercase font-bold mb-1">Volume Total</p>
                                                        <p className="font-bold text-lg sm:text-xl text-blue-600">{totalStock} <span className="text-[10px] sm:text-xs text-blue-400">pces</span></p>
                                                    </div>
                                                    <div className="bg-white p-2 sm:p-3 rounded-lg border border-stone-200 text-center shadow-sm">
                                                        <p className="text-[9px] sm:text-[10px] text-stone-500 uppercase font-bold mb-1">Prix Unitaire</p>
                                                        <p className="font-bold text-lg sm:text-xl text-green-600">{displayPrice} <span className="text-[10px] sm:text-xs text-green-400">€</span></p>
                                                    </div>
                                                </div>

                                                <div className="flex justify-between items-end mb-2 mt-4">
                                                    <p className="text-xs sm:text-sm font-bold text-stone-800 uppercase tracking-wide">Détail du lot :</p>
                                                </div>

                                                <div className="flex flex-col gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                                                    {selectedVariantsGroup.map((v, i) => (
                                                        <div key={i} className="flex justify-between items-center bg-white border border-stone-200 px-2 sm:px-3 py-2 rounded-lg shadow-sm gap-2">
                                                            <div className="flex flex-col flex-1 min-w-0">
                                                                <span className="text-stone-800 font-bold text-xs sm:text-sm truncate">
                                                                    {v['Option2 Value'] || 'Défaut'} - <span className="bg-stone-100 px-1.5 py-0.5 rounded text-stone-600">{v['Option1 Value'] || 'TU'}</span>
                                                                </span>
                                                                {v['Variant Barcode'] ? 
                                                                    <span className="text-[10px] sm:text-[11px] text-stone-600 font-mono flex items-center gap-1 font-bold mt-1"><IconBarcode className="w-3 h-3 text-blue-500"/> {v['Variant Barcode']}</span> :
                                                                    <span className="text-[9px] sm:text-[10px] text-amber-500 font-mono flex items-center gap-1 mt-1 font-bold">⚠️ EAN Manquant</span>
                                                                }
                                                            </div>
                                                            <div className="flex items-center gap-2 shrink-0">
                                                                <span className="text-blue-700 font-bold bg-blue-50 px-2 py-1 rounded-md text-xs sm:text-sm border border-blue-100">
                                                                    Qté: {v['Variant Inventory Qty'] || '0'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-2 sm:gap-3 mt-4 sm:mt-6">
                                                <button onClick={handleGenerateEANInModal} className="w-full flex justify-center items-center gap-2 px-4 py-3 sm:py-3.5 bg-blue-50 hover:bg-blue-100 border border-blue-300 text-blue-800 rounded-xl font-bold transition-colors text-sm sm:text-base shadow-sm">
                                                    <IconBarcode className="w-5 h-5" /> 1. Générer les EAN manquants
                                                </button>
                                                <button 
                                                    onClick={() => {
                                                        const printContainer = document.getElementById('print-container');
                                                        if(printContainer) {
                                                            const labelsHtml = modalLabelsToPrint.map(lbl => `
                                                                <div class="print-label">
                                                                    <div class="print-label-title">${lbl.title || 'PAM BOUTIQUE'}</div>
                                                                    <div class="print-label-info">${lbl.size} | ${lbl.color}</div>
                                                                    ${lbl.ean ? `<img class="print-label-barcode" src="https://bwipjs-api.metafloor.com/?bcid=ean13&text=${lbl.ean}&scale=2&height=5&textxalign=center&textsize=8" />` : '<div class="no-barcode">SANS EAN</div>'}
                                                                    <div class="print-label-price">${lbl.price ? lbl.price + ' €' : ''}</div>
                                                                </div>
                                                            `).join('');
                                                            printContainer.innerHTML = labelsHtml;
                                                            window.print();
                                                        }
                                                    }} 
                                                    disabled={totalStock === 0}
                                                    className="w-full px-4 py-3 sm:py-4 text-white bg-stone-900 hover:bg-black rounded-xl font-bold shadow-md transition-colors flex justify-center items-center gap-2 disabled:opacity-50 text-sm sm:text-base"
                                                >
                                                    <IconPrinter className="w-5 h-5"/> 2. Imprimer {totalStock} étiquettes
                                                </button>
                                                
                                                <div className="flex justify-center mt-3">
                                                    <button onClick={loadProductToForm} className="text-sm text-stone-500 hover:text-stone-900 font-bold underline bg-stone-100 px-4 py-2 rounded-lg transition-colors">✏️ Éditer la fiche (Prix, Tailles, Stock...)</button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center py-6">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-6"><IconSearch className="w-8 h-8 sm:w-10 sm:h-10" /></div>
                                            <h4 className="font-bold text-stone-900 text-lg sm:text-xl mb-2 pam-boutique-title">Produit Introuvable</h4>
                                            <p className="text-stone-600 mb-6 text-sm sm:text-base px-4">La référence n'existe pas encore dans la base.</p>
                                            <div className="flex flex-col gap-2">
                                                <button onClick={() => { setShowModal(false); handleCreateDirect(); }} className="w-full px-4 py-3 sm:py-4 text-stone-900 bg-yellow-400 hover:bg-yellow-500 rounded-xl font-bold shadow-md transition-colors text-sm sm:text-base flex justify-center items-center gap-2"><IconPlus /> Créer la fiche</button>
                                                <button onClick={() => setShowModal(false)} className="w-full px-4 py-3 border border-stone-300 rounded-xl hover:bg-stone-50 font-bold text-stone-700 transition-colors text-sm sm:text-base">Fermer</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                </div>
                </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
